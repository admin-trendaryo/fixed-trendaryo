<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track your Trendaryo order in real-time. Get shipping updates and delivery estimates.">
    <title>Track Order - Trendaryo</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="responsive-universal.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f0ff;
            --accent-2: #ff00aa;
            --accent-3: #00ff88;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: #0a0a2a; color: #fff; overflow-x: hidden; }
        #three-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* Override any header styles to ensure transparency */
        .store-header {
            background: transparent !important;
        }
        
        .store-header.scrolled {
            background: rgba(0,0,0,0.12) !important;
        }

        /* Fix nav menu text colors */
        .store-nav-link {
            color: rgba(255,255,255,0.85) !important;
        }
        
        .store-nav-link:hover {
            color: rgba(255,255,255,1) !important;
        }
        
        .store-nav-link[aria-current="page"] {
            color: rgba(255,255,255,1) !important;
        }

        .page-offset { padding-top: 150px; }

        .track-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .track-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .track-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .track-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
        }

        .track-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .order-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .info-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
        }

        .info-value.accent {
            color: var(--accent);
        }

        .tracking-timeline {
            position: relative;
            padding: 2rem 0;
        }

        .timeline-item {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            position: relative;
        }

        .timeline-item:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 20px;
            top: 60px;
            width: 2px;
            height: calc(100% + 20px);
            background: linear-gradient(180deg, var(--accent), transparent);
        }

        .timeline-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--glass);
            border: 2px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .timeline-dot.completed {
            background: rgba(0, 255, 136, 0.2);
            border-color: var(--accent-3);
        }

        .timeline-dot.current {
            background: rgba(0, 240, 255, 0.2);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }

        .timeline-content {
            flex: 1;
            padding-top: 0.5rem;
        }

        .timeline-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
        }

        .timeline-date {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .timeline-description {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .shipping-details {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .details-title {
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: rgba(255, 255, 255, 0.6);
        }

        .detail-value {
            font-weight: 700;
            color: #fff;
        }

        .estimated-delivery {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.15), rgba(0, 240, 255, 0.15));
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 16px;
            padding: 1.5rem;
            margin-top: 2rem;
            text-align: center;
        }

        .delivery-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .delivery-date {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--accent-3);
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 0.9rem 1.8rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            border-color: var(--accent);
            background: rgba(0, 240, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn-action-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-3));
            border: none;
            color: #000;
            font-weight: 800;
        }

        .btn-action-primary:hover {
            background: linear-gradient(135deg, var(--accent-3), var(--accent));
        }

        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.9rem;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
        }

        @media (max-width: 768px) {
            .order-info {
                grid-template-columns: 1fr;
            }

            .timeline-item {
                gap: 1rem;
            }

            .actions {
                flex-direction: column;
            }

            .btn-action {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <script src="components.js"></script>
    <canvas id="three-canvas"></canvas>

    <div class="page-offset">
        <div class="track-container">
            <div class="track-header">
                <h1 class="track-title">📍 Track Your Order</h1>
                <p class="track-subtitle">Real-time shipping updates and delivery information</p>
            </div>

            <div id="alertBox" class="alert"></div>

            <div id="trackingContent">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading tracking information...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="auth-manager.js"></script>
    <script src="order-manager.js"></script>
    <script src="bg-optimized.js"></script>
    <script>
        const alertBox = document.getElementById('alertBox');
        const trackingContent = document.getElementById('trackingContent');

        function showAlert(message, type = 'error') {
            alertBox.textContent = message;
            alertBox.className = `alert show alert-${type}`;
            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 5000);
        }

        function getStatusIcon(status) {
            const icons = {
                pending: '⏳',
                processing: '⚙️',
                shipped: '🚚',
                delivered: '✅',
                cancelled: '❌'
            };
            return icons[status] || '📦';
        }

        function renderTracking(order, tracking) {
            const estimatedDelivery = window.OrderManager.getEstimatedDeliveryDate(
                order.createdAt,
                order.shippingMethod
            );

            const timeline = [
                {
                    title: 'Order Placed',
                    date: window.OrderManager.formatOrderDate(order.createdAt),
                    description: 'Your order has been confirmed',
                    status: 'completed',
                    icon: '📦'
                },
                {
                    title: 'Processing',
                    date: order.status === 'processing' ? 'In Progress' : 'Completed',
                    description: 'We are preparing your order for shipment',
                    status: order.status === 'processing' ? 'current' : 'completed',
                    icon: '⚙️'
                },
                {
                    title: 'Shipped',
                    date: tracking?.shippedDate ? window.OrderManager.formatOrderDate(tracking.shippedDate) : 'Pending',
                    description: `Tracking: ${tracking?.trackingNumber || 'Not available yet'}`,
                    status: ['shipped', 'delivered'].includes(order.status) ? 'completed' : 'pending',
                    icon: '🚚'
                },
                {
                    title: 'Delivered',
                    date: tracking?.deliveredDate ? window.OrderManager.formatOrderDate(tracking.deliveredDate) : 'Pending',
                    description: 'Your order has been delivered',
                    status: order.status === 'delivered' ? 'completed' : 'pending',
                    icon: '✅'
                }
            ];

            trackingContent.innerHTML = `
                <div class="track-card">
                    <div class="order-info">
                        <div class="info-item">
                            <span class="info-label">Order ID</span>
                            <span class="info-value accent">#${order.id.substring(0, 8).toUpperCase()}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Status</span>
                            <span class="info-value">${getStatusIcon(order.status)} ${order.status.toUpperCase()}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Order Date</span>
                            <span class="info-value">${window.OrderManager.formatOrderDate(order.createdAt)}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Total Amount</span>
                            <span class="info-value accent">$${order.total.toFixed(2)}</span>
                        </div>
                    </div>

                    <div class="tracking-timeline">
                        ${timeline.map(item => `
                            <div class="timeline-item">
                                <div class="timeline-dot ${item.status}">
                                    ${item.icon}
                                </div>
                                <div class="timeline-content">
                                    <div class="timeline-title">${item.title}</div>
                                    <div class="timeline-date">${item.date}</div>
                                    <div class="timeline-description">${item.description}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="shipping-details">
                        <div class="details-title">📦 Shipping Details</div>
                        <div class="detail-row">
                            <span class="detail-label">Shipping Method</span>
                            <span class="detail-value">${order.shippingMethod === 'express' ? 'Express (2-3 days)' : 'Standard (5-7 days)'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Carrier</span>
                            <span class="detail-value">${tracking?.carrier || 'Not assigned yet'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Tracking Number</span>
                            <span class="detail-value">${tracking?.trackingNumber || 'Not available yet'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Delivery Address</span>
                            <span class="detail-value">${order.shippingAddress.address}, ${order.shippingAddress.city}, ${order.shippingAddress.state} ${order.shippingAddress.zipCode}</span>
                        </div>
                    </div>

                    ${order.status !== 'delivered' && order.status !== 'cancelled' ? `
                        <div class="estimated-delivery">
                            <div class="delivery-label">Estimated Delivery</div>
                            <div class="delivery-date">${estimatedDelivery.toLocaleDateString()}</div>
                        </div>
                    ` : ''}

                    <div class="actions">
                        <button class="btn-action btn-action-primary" onclick="window.location.href='orders.html'">
                            📦 Back to Orders
                        </button>
                        <button class="btn-action" onclick="printTracking()">
                            🖨️ Print
                        </button>
                        <button class="btn-action" onclick="shareTracking()">
                            📤 Share
                        </button>
                    </div>
                </div>
            `;
        }

        async function loadTracking() {
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('orderId');

            if (!orderId) {
                showAlert('Order ID not found', 'error');
                return;
            }

            const orderResult = await window.OrderManager.getOrderById(orderId);
            if (!orderResult.success) {
                showAlert('Failed to load order information', 'error');
                return;
            }

            const trackingResult = await window.OrderManager.getTrackingInfo(orderId);
            const tracking = trackingResult.success ? trackingResult.data : null;

            renderTracking(orderResult.data, tracking);
        }

        function printTracking() {
            window.print();
        }

        function shareTracking() {
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('orderId');
            const shareUrl = `${window.location.origin}${window.location.pathname}?orderId=${orderId}`;

            if (navigator.share) {
                navigator.share({
                    title: 'Track My Order',
                    text: 'Check out my order tracking',
                    url: shareUrl
                });
            } else {
                const text = `Track my order: ${shareUrl}`;
                navigator.clipboard.writeText(text);
                alert('Tracking link copied to clipboard!');
            }
        }

        window.addEventListener('load', () => {
            if (!window.AuthManager.isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }

            loadTracking();
        });
    </script>
</body>
</html>
