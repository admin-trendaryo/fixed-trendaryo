<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Management - Admin - Trendaryo</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="responsive-universal.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2em;
            background: linear-gradient(135deg, #00f0ff, #ff00aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #00f0ff;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
        }

        .btn:hover {
            background: rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .btn.primary {
            background: rgba(0, 255, 136, 0.2);
            border-color: rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        .btn.primary:hover {
            background: rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 0.9em;
            color: #00f0ff;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            background: linear-gradient(135deg, #00f0ff, #ff00aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-group label {
            color: #00f0ff;
            font-weight: bold;
        }

        input[type="text"],
        input[type="date"],
        select {
            padding: 10px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: #e0e0e0;
            border-radius: 5px;
            font-family: 'Rajdhani', sans-serif;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .section {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(0, 240, 255, 0.1);
            padding: 12px;
            text-align: left;
            color: #00f0ff;
            font-weight: bold;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
        }

        tr:hover {
            background: rgba(0, 240, 255, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .status-completed {
            background: rgba(34, 139, 34, 0.2);
            color: #228B22;
        }

        .status-pending {
            background: rgba(255, 165, 0, 0.2);
            color: #FFA500;
        }

        .status-failed {
            background: rgba(220, 20, 60, 0.2);
            color: #DC143C;
        }

        .status-refunded {
            background: rgba(65, 105, 225, 0.2);
            color: #4169E1;
        }

        .action-btn {
            padding: 6px 12px;
            background: rgba(0, 240, 255, 0.2);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #00f0ff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s ease;
            margin-right: 5px;
        }

        .action-btn:hover {
            background: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .action-btn.danger {
            background: rgba(220, 20, 60, 0.2);
            border-color: rgba(220, 20, 60, 0.3);
            color: #DC143C;
        }

        .action-btn.danger:hover {
            background: rgba(220, 20, 60, 0.3);
            box-shadow: 0 0 15px rgba(220, 20, 60, 0.3);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5em;
            color: #00f0ff;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: #00f0ff;
            font-size: 1.5em;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #00f0ff;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: #e0e0e0;
            border-radius: 5px;
            font-family: 'Rajdhani', sans-serif;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.3s ease;
        }

        .modal-actions .save {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .modal-actions .save:hover {
            background: rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .modal-actions .cancel {
            background: rgba(220, 20, 60, 0.2);
            color: #DC143C;
            border: 1px solid rgba(220, 20, 60, 0.3);
        }

        .modal-actions .cancel:hover {
            background: rgba(220, 20, 60, 0.3);
            box-shadow: 0 0 15px rgba(220, 20, 60, 0.3);
        }

        .transaction-details {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .transaction-details-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
        }

        .transaction-details-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .transaction-details-label {
            color: #00f0ff;
            font-weight: bold;
        }

        .transaction-details-value {
            color: #e0e0e0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #00f0ff;
        }

        .spinner {
            border: 3px solid rgba(0, 240, 255, 0.2);
            border-top: 3px solid #00f0ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .pagination button {
            padding: 8px 12px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: #00f0ff;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pagination button:hover {
            background: rgba(0, 240, 255, 0.2);
        }

        .pagination button.active {
            background: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .header-actions {
                width: 100%;
                justify-content: center;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .filters {
                flex-direction: column;
            }

            .filter-group {
                flex-direction: column;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>💳 Payment Management</h1>
            <div class="header-actions">
                <button class="btn" onclick="goBack()">← Back</button>
                <button class="btn primary" onclick="exportTransactions()">📥 Export</button>
            </div>
        </div>

        <!-- Statistics -->
        <div class="stats-grid" id="statsGrid">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <label>Search:</label>
                <input type="text" id="searchInput" placeholder="Transaction ID or customer..." onkeyup="handleSearch()">
            </div>
            <div class="filter-group">
                <label>Status:</label>
                <select id="statusFilter" onchange="applyFilters()">
                    <option value="">All</option>
                    <option value="completed">Completed</option>
                    <option value="pending">Pending</option>
                    <option value="failed">Failed</option>
                    <option value="refunded">Refunded</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Date From:</label>
                <input type="date" id="dateFrom" onchange="applyFilters()">
            </div>
            <div class="filter-group">
                <label>Date To:</label>
                <input type="date" id="dateTo" onchange="applyFilters()">
            </div>
        </div>

        <!-- Transactions Table -->
        <div class="section">
            <div class="table-container" id="transactionsTable">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading transactions...
                </div>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <!-- Refund Modal -->
    <div class="modal" id="refundModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Process Refund</span>
                <button class="modal-close" onclick="closeModal('refundModal')">✕</button>
            </div>
            <div class="transaction-details" id="transactionInfo"></div>
            <form id="refundForm">
                <div class="form-group">
                    <label>Refund Amount</label>
                    <input type="number" id="refundAmount" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Reason</label>
                    <textarea id="refundReason" rows="3" placeholder="Reason for refund..." required></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="save" onclick="processRefund()">Process Refund</button>
                    <button type="button" class="cancel" onclick="closeModal('refundModal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin-manager.js"></script>
    <script>
        let currentPage = 1;
        let currentFilters = {};
        let currentTransactionId = null;
        let currentTransactionAmount = 0;

        // Check admin access
        function checkAdminAccess() {
            if (!window.AdminManager.isAdmin()) {
                alert('Access denied. Admin privileges required.');
                window.location.href = 'admin-login.html';
            }
        }

        // Load payment stats
        async function loadPaymentStats() {
            try {
                const stats = await window.AdminManager.getPaymentStats();
                displayStats(stats);
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Display stats
        function displayStats(stats) {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Total Revenue</div>
                    <div class="stat-value">${window.AdminManager.formatCurrency(stats.totalRevenue || 0)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Transactions</div>
                    <div class="stat-value">${stats.totalTransactions || 0}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Completed</div>
                    <div class="stat-value">${stats.completedTransactions || 0}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Refunded</div>
                    <div class="stat-value">${window.AdminManager.formatCurrency(stats.totalRefunded || 0)}</div>
                </div>
            `;
        }

        // Load transactions
        async function loadTransactions(page = 1) {
            try {
                currentPage = page;
                const response = await window.AdminManager.getAllTransactions(page, 20, currentFilters);
                displayTransactions(response.data || []);
                displayPagination(response.pagination || {});
            } catch (error) {
                console.error('Error loading transactions:', error);
                document.getElementById('transactionsTable').innerHTML = 
                    '<div class="error-message">Failed to load transactions</div>';
            }
        }

        // Display transactions
        function displayTransactions(transactions) {
            if (transactions.length === 0) {
                document.getElementById('transactionsTable').innerHTML = 
                    '<p style="text-align: center; color: #00f0ff; padding: 20px;">No transactions found</p>';
                return;
            }

            const table = `
                <table>
                    <thead>
                        <tr>
                            <th>Transaction ID</th>
                            <th>Customer</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Method</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${transactions.map(tx => `
                            <tr>
                                <td>#${tx.id}</td>
                                <td>${tx.customerName || 'N/A'}</td>
                                <td>${window.AdminManager.formatCurrency(tx.amount || 0)}</td>
                                <td><span class="status-badge status-${tx.status}">${tx.status}</span></td>
                                <td>${tx.method || 'N/A'}</td>
                                <td>${window.AdminManager.formatDate(tx.createdAt)}</td>
                                <td>
                                    <button class="action-btn" onclick="viewTransaction('${tx.id}')">View</button>
                                    <button class="action-btn danger" onclick="refundTransaction('${tx.id}', ${tx.amount})" ${tx.status === 'refunded' ? 'disabled' : ''}>Refund</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('transactionsTable').innerHTML = table;
        }

        // Display pagination
        function displayPagination(pagination) {
            const paginationDiv = document.getElementById('pagination');
            if (!pagination.totalPages || pagination.totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }

            let html = '';
            if (pagination.page > 1) {
                html += `<button onclick="loadTransactions(${pagination.page - 1})">← Previous</button>`;
            }

            for (let i = 1; i <= pagination.totalPages; i++) {
                html += `<button ${i === pagination.page ? 'class="active"' : ''} onclick="loadTransactions(${i})">${i}</button>`;
            }

            if (pagination.page < pagination.totalPages) {
                html += `<button onclick="loadTransactions(${pagination.page + 1})">Next →</button>`;
            }

            paginationDiv.innerHTML = html;
        }

        // Handle search
        let searchTimeout;
        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                applyFilters();
            }, 500);
        }

        // Apply filters
        function applyFilters() {
            currentFilters = {
                search: document.getElementById('searchInput').value,
                status: document.getElementById('statusFilter').value,
                dateFrom: document.getElementById('dateFrom').value,
                dateTo: document.getElementById('dateTo').value
            };
            loadTransactions(1);
        }

        // View transaction
        async function viewTransaction(transactionId) {
            try {
                const tx = await window.AdminManager.getTransactionById(transactionId);
                alert(`Transaction #${tx.id}\nAmount: ${window.AdminManager.formatCurrency(tx.amount)}\nStatus: ${tx.status}\nDate: ${window.AdminManager.formatDateTime(tx.createdAt)}`);
            } catch (error) {
                console.error('Error loading transaction:', error);
                alert('Failed to load transaction details');
            }
        }

        // Refund transaction
        function refundTransaction(transactionId, amount) {
            currentTransactionId = transactionId;
            currentTransactionAmount = amount;
            document.getElementById('transactionInfo').innerHTML = `
                <div class="transaction-details-row">
                    <span class="transaction-details-label">Transaction ID:</span>
                    <span class="transaction-details-value">#${transactionId}</span>
                </div>
                <div class="transaction-details-row">
                    <span class="transaction-details-label">Original Amount:</span>
                    <span class="transaction-details-value">${window.AdminManager.formatCurrency(amount)}</span>
                </div>
            `;
            document.getElementById('refundAmount').value = amount;
            document.getElementById('refundAmount').max = amount;
            document.getElementById('refundReason').value = '';
            openModal('refundModal');
        }

        // Process refund
        async function processRefund() {
            try {
                const amount = parseFloat(document.getElementById('refundAmount').value);
                const reason = document.getElementById('refundReason').value;

                if (!amount || amount <= 0 || amount > currentTransactionAmount) {
                    alert('Please enter a valid refund amount');
                    return;
                }

                if (!reason) {
                    alert('Please provide a reason for the refund');
                    return;
                }

                await window.AdminManager.processRefund(currentTransactionId, amount, reason);
                alert('Refund processed successfully');
                closeModal('refundModal');
                loadTransactions(currentPage);
            } catch (error) {
                console.error('Error processing refund:', error);
                alert('Failed to process refund');
            }
        }

        // Export transactions
        async function exportTransactions() {
            try {
                const response = await window.AdminManager.exportTransactions(currentFilters);
                window.AdminManager.exportToCSV(response.data, 'transactions');
            } catch (error) {
                console.error('Error exporting transactions:', error);
                alert('Failed to export transactions');
            }
        }

        // Modal functions
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // Go back
        function goBack() {
            window.location.href = 'admin-dashboard-enhanced.html';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkAdminAccess();
            loadPaymentStats();
            loadTransactions();
        });
    </script>
</body>
</html>
