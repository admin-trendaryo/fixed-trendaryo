<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management - Admin - Trendaryo</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="responsive-universal.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2em;
            background: linear-gradient(135deg, #00f0ff, #ff00aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #00f0ff;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
        }

        .btn:hover {
            background: rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .btn.primary {
            background: rgba(0, 255, 136, 0.2);
            border-color: rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        .btn.primary:hover {
            background: rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-group label {
            color: #00f0ff;
            font-weight: bold;
        }

        input[type="text"],
        input[type="date"],
        select {
            padding: 10px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: #e0e0e0;
            border-radius: 5px;
            font-family: 'Rajdhani', sans-serif;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .section {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(0, 240, 255, 0.1);
            padding: 12px;
            text-align: left;
            color: #00f0ff;
            font-weight: bold;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
        }

        tr:hover {
            background: rgba(0, 240, 255, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .status-pending {
            background: rgba(255, 165, 0, 0.2);
            color: #FFA500;
        }

        .status-processing {
            background: rgba(65, 105, 225, 0.2);
            color: #4169E1;
        }

        .status-shipped {
            background: rgba(50, 205, 50, 0.2);
            color: #32CD32;
        }

        .status-delivered {
            background: rgba(34, 139, 34, 0.2);
            color: #228B22;
        }

        .status-cancelled {
            background: rgba(220, 20, 60, 0.2);
            color: #DC143C;
        }

        .action-btn {
            padding: 6px 12px;
            background: rgba(0, 240, 255, 0.2);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #00f0ff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s ease;
            margin-right: 5px;
        }

        .action-btn:hover {
            background: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .action-btn.danger {
            background: rgba(220, 20, 60, 0.2);
            border-color: rgba(220, 20, 60, 0.3);
            color: #DC143C;
        }

        .action-btn.danger:hover {
            background: rgba(220, 20, 60, 0.3);
            box-shadow: 0 0 15px rgba(220, 20, 60, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5em;
            color: #00f0ff;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: #00f0ff;
            font-size: 1.5em;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #00f0ff;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: #e0e0e0;
            border-radius: 5px;
            font-family: 'Rajdhani', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.3s ease;
        }

        .modal-actions .save {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .modal-actions .save:hover {
            background: rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .modal-actions .cancel {
            background: rgba(220, 20, 60, 0.2);
            color: #DC143C;
            border: 1px solid rgba(220, 20, 60, 0.3);
        }

        .modal-actions .cancel:hover {
            background: rgba(220, 20, 60, 0.3);
            box-shadow: 0 0 15px rgba(220, 20, 60, 0.3);
        }

        .order-details {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .order-details-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
        }

        .order-details-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .order-details-label {
            color: #00f0ff;
            font-weight: bold;
        }

        .order-details-value {
            color: #e0e0e0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #00f0ff;
        }

        .spinner {
            border: 3px solid rgba(0, 240, 255, 0.2);
            border-top: 3px solid #00f0ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .pagination button {
            padding: 8px 12px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: #00f0ff;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pagination button:hover {
            background: rgba(0, 240, 255, 0.2);
        }

        .pagination button.active {
            background: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .header-actions {
                width: 100%;
                justify-content: center;
            }

            .filters {
                flex-direction: column;
            }

            .filter-group {
                flex-direction: column;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📦 Order Management</h1>
            <div class="header-actions">
                <button class="btn" onclick="goBack()">← Back</button>
                <button class="btn primary" onclick="exportOrders()">📥 Export</button>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <label>Search:</label>
                <input type="text" id="searchInput" placeholder="Order ID or customer..." onkeyup="handleSearch()">
            </div>
            <div class="filter-group">
                <label>Status:</label>
                <select id="statusFilter" onchange="applyFilters()">
                    <option value="">All</option>
                    <option value="pending">Pending</option>
                    <option value="processing">Processing</option>
                    <option value="shipped">Shipped</option>
                    <option value="delivered">Delivered</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Date From:</label>
                <input type="date" id="dateFrom" onchange="applyFilters()">
            </div>
            <div class="filter-group">
                <label>Date To:</label>
                <input type="date" id="dateTo" onchange="applyFilters()">
            </div>
        </div>

        <!-- Orders Table -->
        <div class="section">
            <div class="table-container" id="ordersTable">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading orders...
                </div>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <!-- Update Status Modal -->
    <div class="modal" id="statusModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Update Order Status</span>
                <button class="modal-close" onclick="closeModal('statusModal')">✕</button>
            </div>
            <div class="order-details" id="orderInfo"></div>
            <form id="statusForm">
                <div class="form-group">
                    <label>New Status</label>
                    <select id="newStatus" required>
                        <option value="">Select Status</option>
                        <option value="pending">Pending</option>
                        <option value="processing">Processing</option>
                        <option value="shipped">Shipped</option>
                        <option value="delivered">Delivered</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="statusNotes" rows="3" placeholder="Add notes about this status change..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="save" onclick="updateOrderStatus()">Update Status</button>
                    <button type="button" class="cancel" onclick="closeModal('statusModal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Tracking Modal -->
    <div class="modal" id="trackingModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Add Tracking Information</span>
                <button class="modal-close" onclick="closeModal('trackingModal')">✕</button>
            </div>
            <form id="trackingForm">
                <div class="form-group">
                    <label>Tracking Number</label>
                    <input type="text" id="trackingNumber" required>
                </div>
                <div class="form-group">
                    <label>Carrier</label>
                    <select id="carrier" required>
                        <option value="">Select Carrier</option>
                        <option value="UPS">UPS</option>
                        <option value="FedEx">FedEx</option>
                        <option value="USPS">USPS</option>
                        <option value="DHL">DHL</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Estimated Delivery Date</label>
                    <input type="date" id="estimatedDelivery" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="save" onclick="addTracking()">Add Tracking</button>
                    <button type="button" class="cancel" onclick="closeModal('trackingModal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin-manager.js"></script>
    <script>
        let currentPage = 1;
        let currentFilters = {};
        let currentOrderId = null;

        // Check admin access
        function checkAdminAccess() {
            if (!window.AdminManager.isAdmin()) {
                alert('Access denied. Admin privileges required.');
                window.location.href = 'admin-login.html';
            }
        }

        // Load orders
        async function loadOrders(page = 1) {
            try {
                currentPage = page;
                const response = await window.AdminManager.getAllOrders(page, 20, currentFilters);
                displayOrders(response.data || []);
                displayPagination(response.pagination || {});
            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('ordersTable').innerHTML = 
                    '<div class="error-message">Failed to load orders</div>';
            }
        }

        // Display orders
        function displayOrders(orders) {
            if (orders.length === 0) {
                document.getElementById('ordersTable').innerHTML = 
                    '<p style="text-align: center; color: #00f0ff; padding: 20px;">No orders found</p>';
                return;
            }

            const table = `
                <table>
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${orders.map(order => `
                            <tr>
                                <td>#${order.id}</td>
                                <td>${order.customerName || 'N/A'}</td>
                                <td>${window.AdminManager.formatCurrency(order.total || 0)}</td>
                                <td><span class="status-badge status-${order.status}">${order.status}</span></td>
                                <td>${window.AdminManager.formatDate(order.createdAt)}</td>
                                <td>
                                    <button class="action-btn" onclick="updateStatus('${order.id}')">Status</button>
                                    <button class="action-btn" onclick="addTrackingInfo('${order.id}')">Tracking</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('ordersTable').innerHTML = table;
        }

        // Display pagination
        function displayPagination(pagination) {
            const paginationDiv = document.getElementById('pagination');
            if (!pagination.totalPages || pagination.totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }

            let html = '';
            if (pagination.page > 1) {
                html += `<button onclick="loadOrders(${pagination.page - 1})">← Previous</button>`;
            }

            for (let i = 1; i <= pagination.totalPages; i++) {
                html += `<button ${i === pagination.page ? 'class="active"' : ''} onclick="loadOrders(${i})">${i}</button>`;
            }

            if (pagination.page < pagination.totalPages) {
                html += `<button onclick="loadOrders(${pagination.page + 1})">Next →</button>`;
            }

            paginationDiv.innerHTML = html;
        }

        // Handle search
        let searchTimeout;
        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                applyFilters();
            }, 500);
        }

        // Apply filters
        function applyFilters() {
            currentFilters = {
                search: document.getElementById('searchInput').value,
                status: document.getElementById('statusFilter').value,
                dateFrom: document.getElementById('dateFrom').value,
                dateTo: document.getElementById('dateTo').value
            };
            loadOrders(1);
        }

        // Update status
        async function updateStatus(orderId) {
            try {
                currentOrderId = orderId;
                const order = await window.AdminManager.getOrderById(orderId);
                document.getElementById('orderInfo').innerHTML = `
                    <div class="order-details-row">
                        <span class="order-details-label">Order ID:</span>
                        <span class="order-details-value">#${order.id}</span>
                    </div>
                    <div class="order-details-row">
                        <span class="order-details-label">Customer:</span>
                        <span class="order-details-value">${order.customerName}</span>
                    </div>
                    <div class="order-details-row">
                        <span class="order-details-label">Current Status:</span>
                        <span class="order-details-value">${order.status}</span>
                    </div>
                    <div class="order-details-row">
                        <span class="order-details-label">Amount:</span>
                        <span class="order-details-value">${window.AdminManager.formatCurrency(order.total)}</span>
                    </div>
                `;
                document.getElementById('newStatus').value = '';
                document.getElementById('statusNotes').value = '';
                openModal('statusModal');
            } catch (error) {
                console.error('Error loading order:', error);
                alert('Failed to load order details');
            }
        }

        // Update order status
        async function updateOrderStatus() {
            try {
                const status = document.getElementById('newStatus').value;
                const notes = document.getElementById('statusNotes').value;

                if (!status) {
                    alert('Please select a status');
                    return;
                }

                await window.AdminManager.updateOrderStatus(currentOrderId, status, notes);
                alert('Order status updated successfully');
                closeModal('statusModal');
                loadOrders(currentPage);
            } catch (error) {
                console.error('Error updating order:', error);
                alert('Failed to update order status');
            }
        }

        // Add tracking info
        function addTrackingInfo(orderId) {
            currentOrderId = orderId;
            document.getElementById('trackingNumber').value = '';
            document.getElementById('carrier').value = '';
            document.getElementById('estimatedDelivery').value = '';
            openModal('trackingModal');
        }

        // Add tracking
        async function addTracking() {
            try {
                const trackingData = {
                    trackingNumber: document.getElementById('trackingNumber').value,
                    carrier: document.getElementById('carrier').value,
                    estimatedDelivery: document.getElementById('estimatedDelivery').value
                };

                if (!trackingData.trackingNumber || !trackingData.carrier || !trackingData.estimatedDelivery) {
                    alert('Please fill in all tracking fields');
                    return;
                }

                await window.AdminManager.addTracking(currentOrderId, trackingData);
                alert('Tracking information added successfully');
                closeModal('trackingModal');
                loadOrders(currentPage);
            } catch (error) {
                console.error('Error adding tracking:', error);
                alert('Failed to add tracking information');
            }
        }

        // Export orders
        async function exportOrders() {
            try {
                const response = await window.AdminManager.exportOrders(currentFilters);
                window.AdminManager.exportToCSV(response.data, 'orders');
            } catch (error) {
                console.error('Error exporting orders:', error);
                alert('Failed to export orders');
            }
        }

        // Modal functions
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // Go back
        function goBack() {
            window.location.href = 'admin-dashboard-enhanced.html';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkAdminAccess();
            loadOrders();
        });
    </script>
</body>
</html>
