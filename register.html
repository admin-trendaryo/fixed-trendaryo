<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a free Trendaryo account to enjoy faster checkout, order tracking, wishlist, and exclusive offers.">
    <meta name="keywords" content="register, sign up, create account">
    <meta name="robots" content="noindex, follow">
    <meta name="author" content="Trendaryo">
    <link rel="canonical" href="https://trendaryo.com/register.html">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://trendaryo.com/register.html">
    <meta property="og:title" content="Create Account - Trendaryo">
    <meta property="og:description" content="Create a free Trendaryo account to enjoy faster checkout, order tracking, wishlist, and exclusive offers.">
    <meta property="og:image" content="https://trendaryo.com/assets/trendaryo-crown-star-logo.svg">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://trendaryo.com/register.html">
    <meta property="twitter:title" content="Create Account - Trendaryo">
    <meta property="twitter:description" content="Create a free Trendaryo account to enjoy faster checkout, order tracking, wishlist, and exclusive offers.">
    <meta property="twitter:image" content="https://trendaryo.com/assets/trendaryo-crown-star-logo.svg">
    <title>Create Account - Trendaryo</title>
    <link rel="stylesheet" href="responsive.css">
    <script src="performance.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        :root{--accent:#00f0ff;--accent-2:#ff00aa;--glass:rgba(255,255,255,0.05);--glass-border:rgba(255,255,255,0.1);}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Rajdhani',sans-serif;background:linear-gradient(180deg,#0a0a2a,#1a1a40);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
        .register-container{max-width:450px;width:100%;background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:3rem;backdrop-filter:blur(10px);}
        .logo{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent-2));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:2rem;}
        h1{font-family:'Orbitron',sans-serif;text-align:center;margin-bottom:2rem;font-size:1.8rem;}
        .form-group{margin-bottom:1.5rem;}
        .form-group label{display:block;margin-bottom:0.5rem;color:#ccc;}
        .form-group input{width:100%;padding:0.8rem;border-radius:8px;background:var(--glass);border:1px solid var(--glass-border);color:#fff;font-family:inherit;font-size:1rem;}
        .form-group input:focus{outline:none;border-color:var(--accent);}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
        .btn{width:100%;padding:1rem;border:none;border-radius:10px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:inherit;font-size:1rem;background:var(--accent);color:#000;}
        .btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,240,255,0.3);}
        .btn:disabled{opacity:0.5;cursor:not-allowed;}
        .divider{text-align:center;margin:1.5rem 0;color:#888;position:relative;}
        .divider:before,.divider:after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--glass-border);}
        .divider:before{left:0;}
        .divider:after{right:0;}
        .links{text-align:center;margin-top:1.5rem;}
        .links a{color:var(--accent);text-decoration:none;}
        .links a:hover{text-decoration:underline;}
        .error{background:rgba(255,0,0,0.2);border:1px solid #ff0000;color:#ff6666;padding:0.8rem;border-radius:8px;margin-bottom:1rem;display:none;}
        .error.show{display:block;}
        .success{background:rgba(0,255,136,0.2);border:1px solid var(--accent-3);color:var(--accent-3);padding:0.8rem;border-radius:8px;margin-bottom:1rem;display:none;}
        .success.show{display:block;}
    </style>
<script src="bg.js"></script>
</head>
<body>
    <script src="components.js"></script>
    <canvas id="three-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;"></canvas>
    <div class="register-container">
        <div class="logo">TRENDARYO</div>
        <h1>Create Account</h1>
        
        <div class="error" id="error-message"></div>
        <div class="success" id="success-message"></div>
        
        <form id="register-form">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" required>
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required minlength="6">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit" class="btn" id="register-btn">Create Account</button>
        </form>
        
        <div class="divider">OR</div>
        
        <div class="links">
            <p>Already have an account? <a href="login.html">Login</a></p>
            <p style="margin-top:0.5rem;"><a href="index.html">← Back to Home</a></p>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('register-btn');
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
            
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.classList.add('show');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Creating account...';
            
            try {
                const apiBase = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';
                const res = await fetch(`${apiBase}/api/auth/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({firstName, lastName, email, password})
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.error || 'Registration failed');
                }
                
                successDiv.textContent = 'Account created! Redirecting to login...';
                successDiv.classList.add('show');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
    <!-- Self-Healing System -->
<script>
window.onerror = function(msg, url, lineNo, columnNo, error) {
  console.log('Error caught:', msg);
  const errorDiv = document.createElement('div');
  errorDiv.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#f3f4f6; padding:10px; border-radius:5px; z-index:9999; border:1px solid #ccc;';
  errorDiv.innerHTML = '⚠️ Something went wrong. Retrying...';
  document.body.appendChild(errorDiv);
  setTimeout(() => errorDiv.remove(), 3000);
  return false;
};
</script>
</body>
</html>
