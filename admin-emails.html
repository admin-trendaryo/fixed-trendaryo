<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Management - Admin - Trendaryo</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="responsive-universal.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2em;
            background: linear-gradient(135deg, #00f0ff, #ff00aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #00f0ff;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
        }

        .btn:hover {
            background: rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .btn.primary {
            background: rgba(0, 255, 136, 0.2);
            border-color: rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        .btn.primary:hover {
            background: rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
        }

        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            color: #00f0ff;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            color: #ff00aa;
        }

        .tab-btn.active {
            border-bottom-color: #00f0ff;
            color: #00f0ff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-group label {
            color: #00f0ff;
            font-weight: bold;
        }

        input[type="text"],
        input[type="date"],
        select {
            padding: 10px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: #e0e0e0;
            border-radius: 5px;
            font-family: 'Rajdhani', sans-serif;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .section {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(0, 240, 255, 0.1);
            padding: 12px;
            text-align: left;
            color: #00f0ff;
            font-weight: bold;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
        }

        tr:hover {
            background: rgba(0, 240, 255, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .status-sent {
            background: rgba(34, 139, 34, 0.2);
            color: #228B22;
        }

        .status-pending {
            background: rgba(255, 165, 0, 0.2);
            color: #FFA500;
        }

        .status-failed {
            background: rgba(220, 20, 60, 0.2);
            color: #DC143C;
        }

        .status-bounced {
            background: rgba(65, 105, 225, 0.2);
            color: #4169E1;
        }

        .action-btn {
            padding: 6px 12px;
            background: rgba(0, 240, 255, 0.2);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #00f0ff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s ease;
            margin-right: 5px;
        }

        .action-btn:hover {
            background: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5em;
            color: #00f0ff;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: #00f0ff;
            font-size: 1.5em;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #00f0ff;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: #e0e0e0;
            border-radius: 5px;
            font-family: 'Rajdhani', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.3s ease;
        }

        .modal-actions .save {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .modal-actions .save:hover {
            background: rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .modal-actions .cancel {
            background: rgba(220, 20, 60, 0.2);
            color: #DC143C;
            border: 1px solid rgba(220, 20, 60, 0.3);
        }

        .modal-actions .cancel:hover {
            background: rgba(220, 20, 60, 0.3);
            box-shadow: 0 0 15px rgba(220, 20, 60, 0.3);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #00f0ff;
        }

        .spinner {
            border: 3px solid rgba(0, 240, 255, 0.2);
            border-top: 3px solid #00f0ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .pagination button {
            padding: 8px 12px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: #00f0ff;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pagination button:hover {
            background: rgba(0, 240, 255, 0.2);
        }

        .pagination button.active {
            background: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .header-actions {
                width: 100%;
                justify-content: center;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .filters {
                flex-direction: column;
            }

            .filter-group {
                flex-direction: column;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📧 Email Management</h1>
            <div class="header-actions">
                <button class="btn" onclick="goBack()">← Back</button>
                <button class="btn primary" onclick="openModal('bulkEmailModal')">📤 Send Bulk Email</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('history')">Email History</button>
            <button class="tab-btn" onclick="switchTab('templates')">Templates</button>
        </div>

        <!-- Email History Tab -->
        <div id="history" class="tab-content active">
            <!-- Filters -->
            <div class="filters">
                <div class="filter-group">
                    <label>Search:</label>
                    <input type="text" id="searchInput" placeholder="Email or recipient..." onkeyup="handleSearch()">
                </div>
                <div class="filter-group">
                    <label>Type:</label>
                    <select id="typeFilter" onchange="applyFilters()">
                        <option value="">All</option>
                        <option value="order_confirmation">Order Confirmation</option>
                        <option value="shipping">Shipping Notification</option>
                        <option value="delivery">Delivery Confirmation</option>
                        <option value="review_request">Review Request</option>
                        <option value="promotional">Promotional</option>
                        <option value="welcome">Welcome</option>
                        <option value="password_reset">Password Reset</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Status:</label>
                    <select id="statusFilter" onchange="applyFilters()">
                        <option value="">All</option>
                        <option value="sent">Sent</option>
                        <option value="pending">Pending</option>
                        <option value="failed">Failed</option>
                        <option value="bounced">Bounced</option>
                    </select>
                </div>
            </div>

            <!-- Email History Table -->
            <div class="section">
                <div class="table-container" id="emailsTable">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading emails...
                    </div>
                </div>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>

        <!-- Templates Tab -->
        <div id="templates" class="tab-content">
            <div class="section">
                <div class="table-container" id="templatesTable">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading templates...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bulk Email Modal -->
    <div class="modal" id="bulkEmailModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Send Bulk Email</span>
                <button class="modal-close" onclick="closeModal('bulkEmailModal')">✕</button>
            </div>
            <form id="bulkEmailForm">
                <div class="form-group">
                    <label>Recipients (comma-separated emails)</label>
                    <textarea id="recipients" rows="4" placeholder="email1@example.com, email2@example.com..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="subject" required>
                </div>
                <div class="form-group">
                    <label>Template</label>
                    <select id="template" required>
                        <option value="">Select Template</option>
                        <option value="promotional">Promotional</option>
                        <option value="newsletter">Newsletter</option>
                        <option value="announcement">Announcement</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="message" rows="5" placeholder="Email message..." required></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="save" onclick="sendBulkEmail()">Send Email</button>
                    <button type="button" class="cancel" onclick="closeModal('bulkEmailModal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin-manager.js"></script>
    <script>
        let currentPage = 1;
        let currentFilters = {};

        // Check admin access
        function checkAdminAccess() {
            if (!window.AdminManager.isAdmin()) {
                alert('Access denied. Admin privileges required.');
                window.location.href = 'admin-login.html';
            }
        }

        // Switch tab
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'history') {
                loadEmails();
            } else if (tabName === 'templates') {
                loadTemplates();
            }
        }

        // Load emails
        async function loadEmails(page = 1) {
            try {
                currentPage = page;
                const response = await window.AdminManager.getAllEmails(page, 20, currentFilters);
                displayEmails(response.data || []);
                displayPagination(response.pagination || {});
            } catch (error) {
                console.error('Error loading emails:', error);
                document.getElementById('emailsTable').innerHTML = 
                    '<div class="error-message">Failed to load emails</div>';
            }
        }

        // Display emails
        function displayEmails(emails) {
            if (emails.length === 0) {
                document.getElementById('emailsTable').innerHTML = 
                    '<p style="text-align: center; color: #00f0ff; padding: 20px;">No emails found</p>';
                return;
            }

            const table = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Recipient</th>
                            <th>Type</th>
                            <th>Subject</th>
                            <th>Status</th>
                            <th>Sent Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${emails.map(email => `
                            <tr>
                                <td>#${email.id}</td>
                                <td>${email.recipient}</td>
                                <td>${email.type}</td>
                                <td>${email.subject}</td>
                                <td><span class="status-badge status-${email.status}">${email.status}</span></td>
                                <td>${window.AdminManager.formatDate(email.sentAt)}</td>
                                <td>
                                    <button class="action-btn" onclick="viewEmail('${email.id}')">View</button>
                                    <button class="action-btn" onclick="resendEmail('${email.id}')" ${email.status === 'sent' ? '' : 'disabled'}>Resend</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('emailsTable').innerHTML = table;
        }

        // Load templates
        async function loadTemplates() {
            try {
                const response = await window.AdminManager.getEmailTemplates();
                displayTemplates(response.data || []);
            } catch (error) {
                console.error('Error loading templates:', error);
                document.getElementById('templatesTable').innerHTML = 
                    '<div class="error-message">Failed to load templates</div>';
            }
        }

        // Display templates
        function displayTemplates(templates) {
            if (templates.length === 0) {
                document.getElementById('templatesTable').innerHTML = 
                    '<p style="text-align: center; color: #00f0ff; padding: 20px;">No templates found</p>';
                return;
            }

            const table = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Subject</th>
                            <th>Last Updated</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${templates.map(template => `
                            <tr>
                                <td>#${template.id}</td>
                                <td>${template.name}</td>
                                <td>${template.type}</td>
                                <td>${template.subject}</td>
                                <td>${window.AdminManager.formatDate(template.updatedAt)}</td>
                                <td>
                                    <button class="action-btn" onclick="editTemplate('${template.id}')">Edit</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('templatesTable').innerHTML = table;
        }

        // Display pagination
        function displayPagination(pagination) {
            const paginationDiv = document.getElementById('pagination');
            if (!pagination.totalPages || pagination.totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }

            let html = '';
            if (pagination.page > 1) {
                html += `<button onclick="loadEmails(${pagination.page - 1})">← Previous</button>`;
            }

            for (let i = 1; i <= pagination.totalPages; i++) {
                html += `<button ${i === pagination.page ? 'class="active"' : ''} onclick="loadEmails(${i})">${i}</button>`;
            }

            if (pagination.page < pagination.totalPages) {
                html += `<button onclick="loadEmails(${pagination.page + 1})">Next →</button>`;
            }

            paginationDiv.innerHTML = html;
        }

        // Handle search
        let searchTimeout;
        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                applyFilters();
            }, 500);
        }

        // Apply filters
        function applyFilters() {
            currentFilters = {
                search: document.getElementById('searchInput').value,
                type: document.getElementById('typeFilter').value,
                status: document.getElementById('statusFilter').value
            };
            loadEmails(1);
        }

        // View email
        async function viewEmail(emailId) {
            try {
                const email = await window.AdminManager.getEmailById(emailId);
                alert(`Email #${email.id}\nTo: ${email.recipient}\nSubject: ${email.subject}\nStatus: ${email.status}`);
            } catch (error) {
                console.error('Error loading email:', error);
                alert('Failed to load email details');
            }
        }

        // Resend email
        async function resendEmail(emailId) {
            if (!confirm('Are you sure you want to resend this email?')) return;

            try {
                await window.AdminManager.resendEmail(emailId);
                alert('Email resent successfully');
                loadEmails(currentPage);
            } catch (error) {
                console.error('Error resending email:', error);
                alert('Failed to resend email');
            }
        }

        // Edit template
        function editTemplate(templateId) {
            alert('Template editing coming soon');
        }

        // Send bulk email
        async function sendBulkEmail() {
            try {
                const recipients = document.getElementById('recipients').value
                    .split(',')
                    .map(email => email.trim())
                    .filter(email => email);
                const subject = document.getElementById('subject').value;
                const template = document.getElementById('template').value;
                const message = document.getElementById('message').value;

                if (recipients.length === 0) {
                    alert('Please enter at least one recipient');
                    return;
                }

                if (!subject || !template || !message) {
                    alert('Please fill in all fields');
                    return;
                }

                await window.AdminManager.sendBulkEmail(recipients, subject, template, { message });
                alert(`Email sent to ${recipients.length} recipient(s)`);
                closeModal('bulkEmailModal');
                loadEmails(1);
            } catch (error) {
                console.error('Error sending bulk email:', error);
                alert('Failed to send bulk email');
            }
        }

        // Modal functions
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // Go back
        function goBack() {
            window.location.href = 'admin-dashboard-enhanced.html';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkAdminAccess();
            loadEmails();
        });
    </script>
</body>
</html>
