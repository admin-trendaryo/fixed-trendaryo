    <style>
        :root { --accent: #00f0ff; --accent-2: #ff00aa; --accent-3: #00ff88; --glass: rgba(255,255,255,0.05); --glass-border: rgba(255,255,255,0.1); }
        
        .reset-password-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(180deg, #0a0a2a 0%, #1a1a40 100%);
        }
        
        .reset-password-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .reset-password-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .reset-password-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        
        .reset-password-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        
        .reset-password-subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            line-height: 1.6;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            padding: 0.875rem 1.25rem;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0,240,255,0.05);
            box-shadow: 0 0 0 3px rgba(0,240,255,0.1);
        }
        
        .form-input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        
        .password-strength-weak { background: #ff4444; width: 33%; }
        .password-strength-medium { background: #ffaa00; width: 66%; }
        .password-strength-strong { background: var(--accent-3); width: 100%; }
        
        .password-requirements {
            margin-top: 0.5rem;
            font-size: 0.875rem;
            color: rgba(255,255,255,0.6);
        }
        
        .reset-button {
            width: 100%;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.125rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .reset-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,240,255,0.5);
        }
        
        .reset-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .success-message, .error-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: center;
            display: none;
        }
        
        .success-message {
            background: rgba(0,255,136,0.1);
            border: 1px solid var(--accent-3);
            color: var(--accent-3);
        }
        
        .error-message {
            background: rgba(255,0,170,0.1);
            border: 1px solid var(--accent-2);
            color: var(--accent-2);
        }
        
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 640px) {
            .reset-password-card {

                margin: 1rem;
            }
            
            .reset-password-title {
                font-size: 1.25rem;
            }

    </style>
<script src="bg.js"></script>

<body>
    <canvas id="three-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;"></canvas>
    <div id="header-container" data-type="minimal"></div>
    <div class="reset-password-container">
        <div class="reset-password-card">
            <div class="reset-password-header">
                <div class="reset-password-logo">TRENDARYO</div>
                <h1 class="reset-password-title">Reset Password</h1>
                <p class="reset-password-subtitle">
                    Enter your new password below.
                </p>
            </div>
            
            <div class="success-message" id="successMessage">
                Password reset successful! Redirecting to login...
            </div>
            
            <div class="error-message" id="errorMessage">
                Invalid or expired reset token.
            </div>
            
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="password" class="form-label">New Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Enter new password"
                        required
                        minlength="8"
                    >
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="password-requirements">
                        Password must be at least 8 characters long
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        class="form-input" 
                        placeholder="Confirm new password"
                        required
                    >
                </div>
                
                <button type="submit" class="reset-button" id="resetButton">
                    <span id="buttonText">Reset Password</span>
                    <div class="loading-spinner" id="loadingSpinner"></div>
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 2rem;">
                <p><a href="login.html" style="color: var(--accent); text-decoration: none; font-weight: 600;">Back to Login</a></p>
            </div>
        </div>
    </div>
    
    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            document.getElementById('errorMessage').textContent = 'Reset token is required.';
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('resetPasswordForm').style.display = 'none';
        }
        
        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const requirements = document.querySelector('.password-requirements');
        
        passwordInput.addEventListener('input', (e) => {
            const password = e.target.value;
            let strength = 0;
            let requirementsText = [];
            
            if (password.length >= 8) {
                strength++;
            } else {
                requirementsText.push('at least 8 characters');
            }
            
            if (/[A-Z]/.test(password)) {
                strength++;
            } else {
                requirementsText.push('one uppercase letter');
            }
            
            if (/[0-9]/.test(password)) {
                strength++;
            } else {
                requirementsText.push('one number');
            }
            
            if (/[^A-Za-z0-9]/.test(password)) {
                strength++;
            } else {
                requirementsText.push('one special character');
            }
            
            // Update strength bar
            strengthBar.className = 'password-strength-bar';
            if (password.length > 0) {
                if (strength <= 1) {
                    strengthBar.classList.add('password-strength-weak');
                } else if (strength === 2) {
                    strengthBar.classList.add('password-strength-medium');
                } else {
                    strengthBar.classList.add('password-strength-strong');
                }
            }
            
            // Update requirements text
            if (requirementsText.length > 0) {
                requirements.textContent = 'Password must include ' + requirementsText.join(', ');
            } else {
                requirements.textContent = 'Strong password!';
                requirements.style.color = 'var(--accent-3)';
            }
        });
        
        // Form submission
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetButton = document.getElementById('resetButton');
            const buttonText = document.getElementById('buttonText');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            
            // Validate passwords match
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match.';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Hide previous messages
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            
            // Show loading state
            resetButton.disabled = true;
            buttonText.textContent = 'Resetting...';
            loadingSpinner.style.display = 'block';
            
            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ token, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    successMessage.style.display = 'block';
                    document.getElementById('resetPasswordForm').reset();
                    
                    // Redirect to login after 3 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    errorMessage.textContent = data.error || 'Something went wrong. Please try again.';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'Network error. Please try again.';
                errorMessage.style.display = 'block';
            } finally {
                // Reset button state
                resetButton.disabled = false;
                buttonText.textContent = 'Reset Password';
                loadingSpinner.style.display = 'none';
            }
        });
    </script>
