<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Dashboard - Admin - Trendaryo</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="responsive-universal.css">
    <style>
        * {\n            margin: 0;\n            padding: 0;\n            box-sizing: border-box;\n        }\n\n        body {\n            font-family: 'Rajdhani', sans-serif;\n            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);\n            color: #e0e0e0;\n            min-height: 100vh;\n        }\n\n        .container {\n            max-width: 1400px;\n            margin: 0 auto;\n            padding: 20px;\n        }\n\n        .header {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            margin-bottom: 30px;\n            padding: 20px;\n            background: rgba(0, 240, 255, 0.05);\n            border: 1px solid rgba(0, 240, 255, 0.2);\n            border-radius: 10px;\n            backdrop-filter: blur(10px);\n        }\n\n        .header h1 {\n            font-family: 'Orbitron', sans-serif;\n            font-size: 2em;\n            background: linear-gradient(135deg, #00f0ff, #ff00aa);\n            -webkit-background-clip: text;\n            -webkit-text-fill-color: transparent;\n            background-clip: text;\n        }\n\n        .header-actions {\n            display: flex;\n            gap: 10px;\n        }\n\n        .btn {\n            padding: 10px 20px;\n            background: rgba(0, 240, 255, 0.1);\n            border: 1px solid rgba(0, 240, 255, 0.3);\n            color: #00f0ff;\n            border-radius: 5px;\n            cursor: pointer;\n            transition: all 0.3s ease;\n            font-family: 'Rajdhani', sans-serif;\n        }\n\n        .btn:hover {\n            background: rgba(0, 240, 255, 0.2);\n            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);\n        }\n\n        .btn.primary {\n            background: rgba(0, 255, 136, 0.2);\n            border-color: rgba(0, 255, 136, 0.3);\n            color: #00ff88;\n        }\n\n        .btn.primary:hover {\n            background: rgba(0, 255, 136, 0.3);\n            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);\n        }\n\n        .alerts-section {\n            margin-bottom: 30px;\n        }\n\n        .alert-item {\n            background: rgba(255, 0, 85, 0.1);\n            border: 1px solid rgba(255, 0, 85, 0.3);\n            border-radius: 8px;\n            padding: 15px;\n            margin-bottom: 10px;\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n        }\n\n        .alert-content {\n            flex: 1;\n        }\n\n        .alert-title {\n            color: #ff0055;\n            font-weight: bold;\n            margin-bottom: 5px;\n        }\n\n        .alert-message {\n            color: #e0e0e0;\n            font-size: 0.9em;\n        }\n\n        .alert-actions {\n            display: flex;\n            gap: 10px;\n        }\n\n        .kpi-grid {\n            display: grid;\n            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));\n            gap: 20px;\n            margin-bottom: 30px;\n        }\n\n        .kpi-card {\n            background: rgba(0, 240, 255, 0.05);\n            border: 1px solid rgba(0, 240, 255, 0.2);\n            border-radius: 10px;\n            padding: 20px;\n            backdrop-filter: blur(10px);\n            transition: all 0.3s ease;\n        }\n\n        .kpi-card:hover {\n            background: rgba(0, 240, 255, 0.1);\n            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);\n        }\n\n        .kpi-card.alert {\n            border-color: rgba(255, 0, 85, 0.3);\n            background: rgba(255, 0, 85, 0.05);\n        }\n\n        .kpi-header {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            margin-bottom: 15px;\n        }\n\n        .kpi-name {\n            color: #00f0ff;\n            font-weight: bold;\n        }\n\n        .kpi-status {\n            width: 12px;\n            height: 12px;\n            border-radius: 50%;\n            background: #00ff88;\n        }\n\n        .kpi-status.alert {\n            background: #ff0055;\n            animation: pulse 1s infinite;\n        }\n\n        @keyframes pulse {\n            0%, 100% { opacity: 1; }\n            50% { opacity: 0.5; }\n        }\n\n        .kpi-value {\n            font-size: 2em;\n            font-weight: bold;\n            background: linear-gradient(135deg, #00f0ff, #ff00aa);\n            -webkit-background-clip: text;\n            -webkit-text-fill-color: transparent;\n            background-clip: text;\n            margin-bottom: 10px;\n        }\n\n        .kpi-target {\n            font-size: 0.9em;\n            color: #808080;\n            margin-bottom: 10px;\n        }\n\n        .progress-bar {\n            width: 100%;\n            height: 8px;\n            background: rgba(0, 240, 255, 0.1);\n            border-radius: 4px;\n            overflow: hidden;\n            margin-bottom: 10px;\n        }\n\n        .progress-fill {\n            height: 100%;\n            background: linear-gradient(90deg, #00f0ff, #ff00aa);\n            transition: width 0.3s ease;\n        }\n\n        .kpi-footer {\n            display: flex;\n            justify-content: space-between;\n            font-size: 0.85em;\n            color: #808080;\n        }\n\n        .section {\n            background: rgba(0, 240, 255, 0.05);\n            border: 1px solid rgba(0, 240, 255, 0.2);\n            border-radius: 10px;\n            padding: 20px;\n            backdrop-filter: blur(10px);\n            margin-bottom: 30px;\n        }\n\n        .section-title {\n            font-family: 'Orbitron', sans-serif;\n            font-size: 1.3em;\n            color: #00f0ff;\n            margin-bottom: 20px;\n        }\n\n        .form-group {\n            margin-bottom: 15px;\n        }\n\n        label {\n            display: block;\n            color: #00f0ff;\n            margin-bottom: 5px;\n            font-weight: bold;\n        }\n\n        input[type=\"number\"],\n        select {\n            width: 100%;\n            padding: 10px;\n            background: rgba(0, 240, 255, 0.05);\n            border: 1px solid rgba(0, 240, 255, 0.2);\n            color: #e0e0e0;\n            border-radius: 5px;\n            font-family: 'Rajdhani', sans-serif;\n            box-sizing: border-box;\n        }\n\n        input[type=\"number\"]:focus,\n        select:focus {\n            outline: none;\n            background: rgba(0, 240, 255, 0.1);\n            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);\n        }\n\n        .button-group {\n            display: flex;\n            gap: 10px;\n            margin-top: 15px;\n        }\n\n        .loading {\n            text-align: center;\n            padding: 40px;\n            color: #00f0ff;\n        }\n\n        .spinner {\n            border: 3px solid rgba(0, 240, 255, 0.2);\n            border-top: 3px solid #00f0ff;\n            border-radius: 50%;\n            width: 40px;\n            height: 40px;\n            animation: spin 1s linear infinite;\n            margin: 0 auto 20px;\n        }\n\n        @keyframes spin {\n            0% { transform: rotate(0deg); }\n            100% { transform: rotate(360deg); }\n        }\n\n        @media (max-width: 768px) {\n            .header {\n                flex-direction: column;\n                gap: 15px;\n            }\n\n            .header-actions {\n                width: 100%;\n                justify-content: center;\n            }\n\n            .kpi-grid {\n                grid-template-columns: 1fr;\n            }\n\n            .alert-item {\n                flex-direction: column;\n                gap: 15px;\n            }\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <!-- Header -->\n        <div class=\"header\">\n            <h1>📊 KPI Dashboard</h1>\n            <div class=\"header-actions\">\n                <button class=\"btn\" onclick=\"goBack()\">← Back</button>\n                <button class=\"btn primary\" onclick=\"refreshKPIs()\">🔄 Refresh</button>\n            </div>\n        </div>\n\n        <!-- Active Alerts -->\n        <div class=\"alerts-section\" id=\"alertsSection\" style=\"display: none;\">\n            <div class=\"section-title\">⚠️ Active Alerts</div>\n            <div id=\"alertsList\"></div>\n        </div>\n\n        <!-- KPI Cards -->\n        <div class=\"kpi-grid\" id=\"kpiGrid\">\n            <div class=\"loading\">\n                <div class=\"spinner\"></div>\n            </div>\n        </div>\n\n        <!-- Set Alert Section -->\n        <div class=\"section\">\n            <div class=\"section-title\">Set KPI Alert</div>\n            <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;\">\n                <div class=\"form-group\">\n                    <label>KPI</label>\n                    <select id=\"alertKPI\">\n                        <option value=\"revenue\">Total Revenue</option>\n                        <option value=\"orders\">Total Orders</option>\n                        <option value=\"conversion\">Conversion Rate</option>\n                        <option value=\"aov\">Avg Order Value</option>\n                        <option value=\"retention\">Retention Rate</option>\n                    </select>\n                </div>\n                <div class=\"form-group\">\n                    <label>Condition</label>\n                    <select id=\"alertCondition\">\n                        <option value=\"below\">Below</option>\n                        <option value=\"above\">Above</option>\n                        <option value=\"equals\">Equals</option>\n                    </select>\n                </div>\n                <div class=\"form-group\">\n                    <label>Threshold Value</label>\n                    <input type=\"number\" id=\"alertThreshold\" placeholder=\"Enter value\">\n                </div>\n            </div>\n            <button class=\"btn primary\" onclick=\"setAlert()\">🔔 Set Alert</button>\n        </div>\n    </div>\n\n    <script src=\"admin-manager.js\"></script>\n    <script src=\"analytics-engine.js\"></script>\n    <script>\n        // Check admin access\n        function checkAdminAccess() {\n            if (!window.AdminManager.isAdmin()) {\n                alert('Access denied. Admin privileges required.');\n                window.location.href = 'admin-login.html';\n            }\n        }\n\n        // Load KPIs\n        async function loadKPIs() {\n            try {\n                const data = await window.AnalyticsEngine.getKPIDashboard();\n                displayKPIs(data.kpis);\n                displayAlerts(data.alerts);\n            } catch (error) {\n                console.error('Error loading KPIs:', error);\n                document.getElementById('kpiGrid').innerHTML = \n                    '<div style=\"color: #ff0055;\">Error loading KPI data</div>';\n            }\n        }\n\n        // Display KPIs\n        function displayKPIs(kpis) {\n            const grid = document.getElementById('kpiGrid');\n            grid.innerHTML = (kpis || []).map(kpi => {\n                const percentage = (kpi.current / kpi.target) * 100;\n                const isAlert = percentage < 80;\n                return `\n                    <div class=\"kpi-card ${isAlert ? 'alert' : ''}\">\n                        <div class=\"kpi-header\">\n                            <div class=\"kpi-name\">${kpi.name}</div>\n                            <div class=\"kpi-status ${isAlert ? 'alert' : ''}\"></div>\n                        </div>\n                        <div class=\"kpi-value\">${kpi.displayValue}</div>\n                        <div class=\"kpi-target\">Target: ${kpi.targetDisplay}</div>\n                        <div class=\"progress-bar\">\n                            <div class=\"progress-fill\" style=\"width: ${Math.min(percentage, 100)}%;\"></div>\n                        </div>\n                        <div class=\"kpi-footer\">\n                            <span>${percentage.toFixed(1)}% of target</span>\n                            <span>${kpi.change >= 0 ? '+' : ''}${kpi.change}%</span>\n                        </div>\n                    </div>\n                `;\n            }).join('');\n        }\n\n        // Display alerts\n        function displayAlerts(alerts) {\n            const section = document.getElementById('alertsSection');\n            const list = document.getElementById('alertsList');\n\n            if (!alerts || alerts.length === 0) {\n                section.style.display = 'none';\n                return;\n            }\n\n            section.style.display = 'block';\n            list.innerHTML = alerts.map(alert => `\n                <div class=\"alert-item\">\n                    <div class=\"alert-content\">\n                        <div class=\"alert-title\">${alert.title}</div>\n                        <div class=\"alert-message\">${alert.message}</div>\n                    </div>\n                    <div class=\"alert-actions\">\n                        <button class=\"btn btn-small\" onclick=\"dismissAlert('${alert.id}')\">Dismiss</button>\n                    </div>\n                </div>\n            `).join('');\n        }\n\n        // Set alert\n        async function setAlert() {\n            const kpiId = document.getElementById('alertKPI').value;\n            const condition = document.getElementById('alertCondition').value;\n            const threshold = document.getElementById('alertThreshold').value;\n\n            if (!threshold) {\n                alert('Please enter a threshold value');\n                return;\n            }\n\n            try {\n                await window.AnalyticsEngine.setKPIAlert(kpiId, threshold, condition);\n                alert('Alert set successfully!');\n                document.getElementById('alertThreshold').value = '';\n                loadKPIs();\n            } catch (error) {\n                console.error('Error setting alert:', error);\n                alert('Error setting alert');\n            }\n        }\n\n        // Dismiss alert\n        function dismissAlert(alertId) {\n            // Implementation would call backend to dismiss alert\n            console.log('Dismissing alert:', alertId);\n            loadKPIs();\n        }\n\n        // Refresh KPIs\n        function refreshKPIs() {\n            window.AnalyticsEngine.clearCache();\n            loadKPIs();\n        }\n\n        // Go back\n        function goBack() {\n            window.location.href = 'admin-dashboard-enhanced.html';\n        }\n\n        // Initialize\n        document.addEventListener('DOMContentLoaded', () => {\n            checkAdminAccess();\n            loadKPIs();\n        });\n    </script>\n</body>\n</html>\n
