<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta property="og:description" content="STYLE CO - Trendy fashion and apparel at Trendaryo. Modern styles, quality clothing, and accessories for fashion-forward individuals.">
    <meta property="og:image" content="https://trendaryo.com/assets/trendaryo-crown-star-logo.svg">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">

    <meta property="twitter:title" content="STYLE CO - Fashion & Apparel | Trendaryo">
    <meta property="twitter:description" content="STYLE CO - Trendy fashion and apparel at Trendaryo. Modern styles, quality clothing, and accessories for fashion-forward individuals.">
    <meta property="twitter:image" content="https://trendaryo.com/assets/trendaryo-crown-star-logo.svg">
    
    <title>STYLE CO - Fashion & Apparel | Trendaryo</title>
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="shared.css">
    <script src="performance.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f0ff; --accent-2: #ff00aa; --accent-3: #00ff88; --glass: rgba(255,255,255,0.05); --glass-border: rgba(255,255,255,0.1); }
        body { margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; background: linear-gradient(180deg, #0a0a2a 0%, #1a1a40 100%); color: #fff; }
        .store-header { position: fixed; top: 0; left: 0; right: 0; z-index: 10000; 
        param($m)
        $m.Value -replace 'rgba\(0,0,0,0\.(65|72|8|85|9|92)\)', 'rgba(0,0,0,0.08)'
    : blur(18px); border-bottom: 1px solid var(--glass-border); }
        .store-header-inner { max-width: 1200px; margin: 0 auto; padding: 0.8rem 1.25rem; display: flex; align-items: center; gap: 1rem; }
        .store-logo { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent-2)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .store-actions { display: flex; align-items: center; gap: 0.6rem; margin-left: auto; }
        .store-icon-btn { width: 42px; height: 42px; border-radius: 999px; background: var(--glass); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.9); text-decoration: none; transition: transform 0.2s ease, border-color 0.2s ease; }
        .store-icon-btn:hover { transform: translateY(-1px); border-color: rgba(0,240,255,0.6); background: rgba(0,240,255,0.12); }
    </style>
<script src="bg.js"></script>
</head>
<body>
    <header class="store-header" id="store-header" style="position: fixed;">
        <div class="store-header-inner">
            <div class="store-brand">
                <a href="index.html" class="store-logo">TRENDARYO</a>
            </div>
            <div class="store-actions" style="margin-left: auto;">
                <a href="index.html" class="store-icon-btn" aria-label="Home">🏠</a>
                <a href="shop.html" class="store-icon-btn" aria-label="Shop">🛍️</a>
                <a href="wishlist.html" class="store-icon-btn" aria-label="Wishlist">❤</a>
                <a href="compare.html" class="store-icon-btn" aria-label="Compare">⇄</a>
                <a href="cart.html" class="store-icon-btn" aria-label="Cart">🛒</a>
                <a href="account.html" class="store-icon-btn" aria-label="Account">👤</a>
            </div>
        </div>
    </header>
    <canvas id="three-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;"></canvas>
    
    <div class="page-header-brand" style="padding: 180px 2rem 4rem; text-align: center; background: linear-gradient(135deg, rgba(255,0,170,0.1), rgba(255,0,170,0.05)); border-bottom: 2px solid rgba(255,0,170,0.3);">
        <div style="max-width: 1200px; margin: 0 auto;">
            <div style="display: inline-block; background: linear-gradient(135deg, rgba(255,0,170,0.2), rgba(255,0,170,0.1)); border: 2px solid var(--accent-2); padding: 1rem 2rem; border-radius: 20px; margin-bottom: 2rem;">
                <h1 style="font-family: 'Orbitron', sans-serif; font-size: 4rem; font-weight: 900; color: var(--accent-2); margin: 0; text-shadow: 0 0 30px var(--accent-2);">STYLE CO</h1>
            </div>
            <p style="font-size: 1.3rem; color: rgba(255,255,255,0.9); max-width: 800px; margin: 0 auto 2rem; line-height: 1.8;">Where fashion meets function. Timeless designs for the modern wardrobe.</p>
            <div style="display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap;">
                <div style="text-align: center;">
                    <div style="font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 900; color: var(--accent-2);">20+</div>
                    <div style="color: rgba(255,255,255,0.7);">Collections</div>
                </div>
                <div style="text-align: center;">
                    <div style="font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 900; color: var(--accent-2);">4.9★</div>
                    <div style="color: rgba(255,255,255,0.7);">Rating</div>
                </div>
                <div style="text-align: center;">
                    <div style="font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 900; color: var(--accent-2);">25K+</div>
                    <div style="color: rgba(255,255,255,0.7);">Happy Customers</div>
                </div>
            </div>
        </div>
    </div>

    <main style="padding: 4rem 2rem; max-width: 1400px; margin: 0 auto;">
        <h2 style="font-family: 'Orbitron', sans-serif; font-size: 1.8rem; margin-bottom: 2rem; text-align: center;">STYLE CO Fashion Collection</h2>
        <div id="products-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;"></div>
    </main>

    <script src="script.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 100;
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 1000; i++) vertices.push((Math.random() - 0.5) * 800, (Math.random() - 0.5) * 800, (Math.random() - 0.5) * 500);
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0xff00aa, size: 2 });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => { mouseX = (e.clientX - window.innerWidth / 2) * 0.5; mouseY = (e.clientY - window.innerHeight / 2) * 0.5; });
        function animate() { requestAnimationFrame(animate); camera.position.x += (mouseX - camera.position.x) * 0.05; camera.position.y += (-mouseY - camera.position.y) * 0.05; camera.lookAt(scene.position); particles.rotation.y += 0.001; renderer.render(scene, camera); }
        animate();

        const products = [
            { id: 2, name: "Designer Sunglasses", price: 149, image: "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=500", rating: 5, reviews: 95 },
            { id: 3, name: "Leather Sneakers", price: 189, image: "https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=500", rating: 5, reviews: 203 },
            { id: 14, name: "Denim Jacket", price: 89.99, image: "https://images.unsplash.com/photo-1551537482-f2075a1d41f2?w=500", rating: 4, reviews: 67 },
            { id: 16, name: "Cotton T-Shirt", price: 24.99, image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500", rating: 4, reviews: 189 },
            { id: 17, name: "Floral Dress", price: 69.99, image: "https://images.unsplash.com/photo-1572804013309-59a88b7e92f1?w=500", rating: 5, reviews: 98 },
            { id: 18, name: "Running Shoes", price: 119.99, image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500", rating: 4, reviews: 276 }
        ];

        const grid = document.getElementById('products-grid');
        products.forEach(p => {
            grid.innerHTML += `<a href="product.html?id=${p.id}" style="background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; overflow: hidden; text-decoration: none; color: inherit; transition: all 0.3s;" onmouseover="this.style.transform='translateY(-10px)'; this.style.borderColor='var(--accent-2)';" onmouseout="this.style.transform=''; this.style.borderColor='';">
                <div style="height: 250px; background: url('${p.image}') center/cover;"></div>
                <div style="padding: 1.5rem;">
                    <h3 style="font-family: 'Orbitron', sans-serif; margin-bottom: 0.5rem;">${p.name}</h3>
                    <div style="color: #ffd700; margin-bottom: 0.5rem;">${'★'.repeat(p.rating)}${'☆'.repeat(5-p.rating)} (${p.reviews})</div>
                    <div style="font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--accent-2); font-weight: 900;">$${p.price}</div>
                    <button style="width: 100%; margin-top: 1rem; padding: 0.75rem; background: linear-gradient(135deg, var(--accent-2), var(--accent)); border: none; border-radius: 8px; color: #fff; font-weight: 700; cursor: pointer;">Add to Cart</button>
                </div>
            </a>`;
        });
    </script>
    
    <!-- Footer -->
    <div id="footer-container"></div>
    <script src="components.js"></script>

    <!-- Self-Healing System -->
<script>
window.onerror = function(msg, url, lineNo, columnNo, error) {
  console.log('Error caught:', msg);
  const errorDiv = document.createElement('div');
  errorDiv.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#f3f4f6; padding:10px; border-radius:5px; z-index:9999; border:1px solid #ccc;';
  errorDiv.innerHTML = '⚠️ Something went wrong. Retrying...';
  document.body.appendChild(errorDiv);
  setTimeout(() => errorDiv.remove(), 3000);
  return false;
};
</script>
</body>
</html>
