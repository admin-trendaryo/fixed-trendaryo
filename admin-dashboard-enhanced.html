<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Trendaryo</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="responsive-universal.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .admin-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5em;
            background: linear-gradient(135deg, #00f0ff, #ff00aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .admin-nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 20px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #00f0ff;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9em;
        }

        .nav-btn:hover {
            background: rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .nav-btn.active {
            background: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
            transform: translateY(-5px);
        }

        .stat-label {
            font-size: 0.9em;
            color: #00f0ff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            background: linear-gradient(135deg, #00f0ff, #ff00aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .stat-change {
            font-size: 0.85em;
            color: #00ff88;
        }

        .stat-change.negative {
            color: #ff0055;
        }

        .section {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5em;
            color: #00f0ff;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title a {
            font-size: 0.7em;
            color: #ff00aa;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .section-title a:hover {
            color: #00f0ff;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(0, 240, 255, 0.1);
            padding: 12px;
            text-align: left;
            color: #00f0ff;
            font-weight: bold;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
        }

        tr:hover {
            background: rgba(0, 240, 255, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .status-pending {
            background: rgba(255, 165, 0, 0.2);
            color: #FFA500;
        }

        .status-processing {
            background: rgba(65, 105, 225, 0.2);
            color: #4169E1;
        }

        .status-shipped {
            background: rgba(50, 205, 50, 0.2);
            color: #32CD32;
        }

        .status-delivered {
            background: rgba(34, 139, 34, 0.2);
            color: #228B22;
        }

        .status-cancelled {
            background: rgba(220, 20, 60, 0.2);
            color: #DC143C;
        }

        .action-btn {
            padding: 6px 12px;
            background: rgba(0, 240, 255, 0.2);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #00f0ff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s ease;
            margin-right: 5px;
        }

        .action-btn:hover {
            background: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .action-btn.danger {
            background: rgba(220, 20, 60, 0.2);
            border-color: rgba(220, 20, 60, 0.3);
            color: #DC143C;
        }

        .action-btn.danger:hover {
            background: rgba(220, 20, 60, 0.3);
            box-shadow: 0 0 15px rgba(220, 20, 60, 0.3);
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .action-card {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .action-card:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
            transform: translateY(-5px);
        }

        .action-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .action-title {
            font-weight: bold;
            color: #00f0ff;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #00f0ff;
        }

        .spinner {
            border: 3px solid rgba(0, 240, 255, 0.2);
            border-top: 3px solid #00f0ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(220, 20, 60, 0.2);
            border: 1px solid rgba(220, 20, 60, 0.3);
            color: #DC143C;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .success-message {
            background: rgba(34, 139, 34, 0.2);
            border: 1px solid rgba(34, 139, 34, 0.3);
            color: #228B22;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                gap: 15px;
            }

            .admin-header h1 {
                font-size: 1.8em;
            }

            .admin-nav {
                width: 100%;
                justify-content: center;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .table-container {
                font-size: 0.9em;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <h1>📊 Admin Dashboard</h1>
            <div class="admin-nav">
                <button class="nav-btn active" onclick="loadSection('overview')">Overview</button>
                <button class="nav-btn" onclick="loadSection('users')">Users</button>
                <button class="nav-btn" onclick="loadSection('orders')">Orders</button>
                <button class="nav-btn" onclick="loadSection('payments')">Payments</button>
                <button class="nav-btn" onclick="loadSection('emails')">Emails</button>
                <button class="nav-btn" onclick="loadSection('analytics')">Analytics</button>
                <button class="nav-btn" onclick="loadSection('inventory')">Inventory</button>
                <button class="nav-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Overview Section -->
        <div id="overview-section">
            <!-- Quick Stats -->
            <div class="dashboard-grid" id="stats-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading dashboard...
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions">
                <a href="admin-users.html" class="action-card">
                    <div class="action-icon">👥</div>
                    <div class="action-title">Manage Users</div>
                </a>
                <a href="admin-orders.html" class="action-card">
                    <div class="action-icon">📦</div>
                    <div class="action-title">Manage Orders</div>
                </a>
                <a href="admin-payments.html" class="action-card">
                    <div class="action-icon">💳</div>
                    <div class="action-title">Manage Payments</div>
                </a>
                <a href="admin-emails.html" class="action-card">
                    <div class="action-icon">📧</div>
                    <div class="action-title">Manage Emails</div>
                </a>
                <a href="admin-analytics.html" class="action-card">
                    <div class="action-icon">📈</div>
                    <div class="action-title">View Analytics</div>
                </a>
                <a href="admin-inventory.html" class="action-card">
                    <div class="action-icon">📦</div>
                    <div class="action-title">Manage Inventory</div>
                </a>
            </div>

            <!-- Recent Orders -->
            <div class="section">
                <div class="section-title">
                    Recent Orders
                    <a href="admin-orders.html">View All →</a>
                </div>
                <div class="table-container" id="recent-orders">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading orders...
                    </div>
                </div>
            </div>

            <!-- Recent Users -->
            <div class="section">
                <div class="section-title">
                    Recent Users
                    <a href="admin-users.html">View All →</a>
                </div>
                <div class="table-container" id="recent-users">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading users...
                    </div>
                </div>
            </div>
        </div>

        <!-- Other Sections (loaded dynamically) -->
        <div id="other-sections"></div>
    </div>

    <script src="admin-manager.js"></script>
    <script>
        // Check admin access
        function checkAdminAccess() {
            if (!window.AdminManager.isAdmin()) {
                alert('Access denied. Admin privileges required.');
                window.location.href = 'admin-login.html';
            }
        }

        // Load dashboard overview
        async function loadDashboardOverview() {
            try {
                const overview = await window.AdminManager.getDashboardOverview();
                displayStats(overview);
                loadRecentOrders();
                loadRecentUsers();
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('stats-grid').innerHTML = 
                    '<div class="error-message">Failed to load dashboard data</div>';
            }
        }

        // Display statistics
        function displayStats(data) {
            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Total Revenue</div>
                    <div class="stat-value">${window.AdminManager.formatCurrency(data.totalRevenue || 0)}</div>
                    <div class="stat-change">${data.revenueChange || '+0%'} from last month</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Orders</div>
                    <div class="stat-value">${data.totalOrders || 0}</div>
                    <div class="stat-change">${data.ordersChange || '+0%'} from last month</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Users</div>
                    <div class="stat-value">${data.totalUsers || 0}</div>
                    <div class="stat-change">${data.usersChange || '+0%'} from last month</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pending Orders</div>
                    <div class="stat-value">${data.pendingOrders || 0}</div>
                    <div class="stat-change">Awaiting processing</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Low Stock Items</div>
                    <div class="stat-value">${data.lowStockItems || 0}</div>
                    <div class="stat-change">Needs attention</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Conversion Rate</div>
                    <div class="stat-value">${data.conversionRate || '0%'}</div>
                    <div class="stat-change">${data.conversionChange || '+0%'} from last month</div>
                </div>
            `;
        }

        // Load recent orders
        async function loadRecentOrders() {
            try {
                const response = await window.AdminManager.getAllOrders(1, 5);
                const orders = response.data || [];
                
                if (orders.length === 0) {
                    document.getElementById('recent-orders').innerHTML = 
                        '<p style="text-align: center; color: #00f0ff;">No orders yet</p>';
                    return;
                }

                const table = `
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${orders.map(order => `
                                <tr>
                                    <td>#${order.id}</td>
                                    <td>${order.customerName || 'N/A'}</td>
                                    <td>${window.AdminManager.formatCurrency(order.total || 0)}</td>
                                    <td><span class="status-badge status-${order.status}">${order.status}</span></td>
                                    <td>${window.AdminManager.formatDate(order.createdAt)}</td>
                                    <td>
                                        <button class="action-btn" onclick="viewOrder('${order.id}')">View</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('recent-orders').innerHTML = table;
            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('recent-orders').innerHTML = 
                    '<div class="error-message">Failed to load orders</div>';
            }
        }

        // Load recent users
        async function loadRecentUsers() {
            try {
                const response = await window.AdminManager.getAllUsers(1, 5);
                const users = response.data || [];
                
                if (users.length === 0) {
                    document.getElementById('recent-users').innerHTML = 
                        '<p style="text-align: center; color: #00f0ff;">No users yet</p>';
                    return;
                }

                const table = `
                    <table>
                        <thead>
                            <tr>
                                <th>User ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Status</th>
                                <th>Joined</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${users.map(user => `
                                <tr>
                                    <td>#${user.id}</td>
                                    <td>${user.firstName} ${user.lastName}</td>
                                    <td>${user.email}</td>
                                    <td><span class="status-badge status-${user.status}">${user.status}</span></td>
                                    <td>${window.AdminManager.formatDate(user.createdAt)}</td>
                                    <td>
                                        <button class="action-btn" onclick="viewUser('${user.id}')">View</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('recent-users').innerHTML = table;
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('recent-users').innerHTML = 
                    '<div class="error-message">Failed to load users</div>';
            }
        }

        // Load section
        function loadSection(section) {
            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (section === 'overview') {
                document.getElementById('overview-section').style.display = 'block';
                document.getElementById('other-sections').innerHTML = '';
                loadDashboardOverview();
            } else {
                document.getElementById('overview-section').style.display = 'none';
                window.location.href = `admin-${section}.html`;
            }
        }

        // View order
        function viewOrder(orderId) {
            window.location.href = `admin-orders.html?id=${orderId}`;
        }

        // View user
        function viewUser(userId) {
            window.location.href = `admin-users.html?id=${userId}`;
        }

        // Logout
        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('userRole');
            window.location.href = 'admin-login.html';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkAdminAccess();
            loadDashboardOverview();
        });
    </script>
</body>
</html>
