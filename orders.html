<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Trendaryo</title>
    <link rel="stylesheet" href="responsive.css">
    <script src="performance.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        :root{--accent:#00f0ff;--accent-2:#ff00aa;--accent-3:#00ff88;--glass:rgba(255,255,255,0.05);--glass-border:rgba(255,255,255,0.1);}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Rajdhani',sans-serif;background:linear-gradient(180deg,#0a0a2a,#1a1a40);color:#fff;padding-top:80px;}
        .container{max-width:1200px;margin:0 auto;padding:2rem;}
        h1{font-family:'Orbitron',sans-serif;margin-bottom:2rem;}
        .orders-list{display:grid;gap:2rem;}
        .order-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:2rem;transition:all 0.2s;}
        .order-card:hover{border-color:var(--accent);}
        .order-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;}
        .order-info h3{font-family:'Orbitron',sans-serif;margin-bottom:0.5rem;}
        .order-meta{color:#888;font-size:0.9rem;}
        .order-status{padding:0.5rem 1rem;border-radius:20px;font-weight:600;font-size:0.9rem;}
        .order-status.processing{background:rgba(255,170,0,0.2);color:#ffaa00;}
        .order-status.shipped{background:rgba(0,240,255,0.2);color:var(--accent);}
        .order-status.delivered{background:rgba(0,255,136,0.2);color:var(--accent-3);}
        .order-items{display:grid;gap:1rem;margin-bottom:1.5rem;}
        .order-item{display:flex;gap:1rem;padding:1rem;background:rgba(0,0,0,0.3);border-radius:10px;}
        .order-item img{width:60px;height:60px;object-fit:cover;border-radius:8px;}
        .order-item-info{flex:1;}
        .order-item-name{font-weight:600;margin-bottom:0.3rem;}
        .order-item-price{color:var(--accent);}
        .order-footer{display:flex;justify-content:space-between;align-items:center;padding-top:1.5rem;border-top:1px solid var(--glass-border);}
        .order-total{font-size:1.3rem;font-weight:700;color:var(--accent);}
        .btn{padding:0.6rem 1.2rem;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit;text-decoration:none;display:inline-block;}
        .btn-primary{background:var(--accent);color:#000;}
        .btn-secondary{background:var(--glass);color:#fff;border:1px solid var(--glass-border);}
        .btn:hover{transform:translateY(-2px);}
        .empty-state{text-align:center;padding:4rem 2rem;color:#888;}
        .empty-state h2{margin-bottom:1rem;}
        @media(max-width:768px){.order-header{flex-direction:column;}.order-footer{flex-direction:column;gap:1rem;align-items:stretch;}}
    </style>
<script src="bg.js"></script>
</head>
<body>
    <canvas id="three-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;"></canvas>
    <div id="header-container"></div>
    
    <div class="container">
        <h1>My Orders</h1>
        <div class="orders-list" id="orders-list"></div>
    </div>
    
    <div id="footer-container"></div>
    <script src="components.js"></script>
    <script>
        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('trendaryo_orders') || '[]');
            const container = document.getElementById('orders-list');
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h2>No Orders Yet</h2>
                        <p>Start shopping to see your orders here</p>
                        <a href="shop.html" class="btn btn-primary" style="margin-top:1.5rem;">Browse Products</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = orders.reverse().map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div class="order-info">
                            <h3>Order #${order.id}</h3>
                            <div class="order-meta">
                                Placed on ${new Date(order.date).toLocaleDateString()} • 
                                ${order.items.length} item${order.items.length > 1 ? 's' : ''}
                            </div>
                        </div>
                        <span class="order-status ${order.status}">${order.status}</span>
                    </div>
                    
                    <div class="order-items">
                        ${order.items.map(item => `
                            <div class="order-item">
                                <img src="${item.image}" alt="${item.name}">
                                <div class="order-item-info">
                                    <div class="order-item-name">${item.name}</div>
                                    <div>Quantity: ${item.quantity}</div>
                                    <div class="order-item-price">$${(item.price * item.quantity).toFixed(2)}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="order-footer">
                        <div class="order-total">Total: $${order.total.toFixed(2)}</div>
                        <div style="display:flex;gap:0.5rem;">
                            <a href="order-success.html?id=${order.id}" class="btn btn-primary">View Details</a>
                            <a href="track-order.html?id=${order.id}" class="btn btn-secondary">Track Order</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        loadOrders();
    </script>

    <!-- Self-Healing System -->
<script>
window.onerror = function(msg, url, lineNo, columnNo, error) {
  console.log('Error caught:', msg);
  const errorDiv = document.createElement('div');
  errorDiv.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#f3f4f6; padding:10px; border-radius:5px; z-index:9999; border:1px solid #ccc;';
  errorDiv.innerHTML = '⚠️ Something went wrong. Retrying...';
  document.body.appendChild(errorDiv);
  setTimeout(() => errorDiv.remove(), 3000);
  return false;
};
</script>
</body>
</html>
