<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Request a return or exchange - Trendaryo">
    <title>Return / Exchange Request - TRENDARYO</title>
    <link rel="stylesheet" href="responsive.css">
    <script src="performance.js"></script>
    <script src="bg.js"></script>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f0ff; --accent-2: #ff00aa; --accent-3: #00ff88; --glass: rgba(255,255,255,0.05); --glass-border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: linear-gradient(180deg, #0a0a2a 0%, #1a1a40 100%); color: #fff; overflow-x: hidden; padding-top: 140px; }
        
        /* Header Styles */
        .store-header { position: fixed; top: 0; left: 0; right: 0; z-index: 10000; 
        param($m)
        $m.Value -replace 'rgba\(0,0,0,0\.(65|72|8|85|9|92)\)', 'rgba(0,0,0,0.08)'
    : blur(18px); border-bottom: 1px solid var(--glass-border); }
        .store-header-inner { max-width: 1200px; margin: 0 auto; padding: 0.8rem 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
        .store-brand { display: flex; align-items: center; gap: 0.75rem; min-width: 180px; }
        .store-logo { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent-2)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; white-space: nowrap; }
        .store-search { flex: 1; display: flex; align-items: center; gap: 0.5rem; padding: 0.55rem 0.9rem; border-radius: 999px; background: var(--glass); border: 1px solid var(--glass-border); min-width: 220px; }
        .store-search input { width: 100%; border: none; outline: none; background: #0a0a2a; color: rgba(255,255,255,0.9); font-family: inherit; font-size: 1rem; }
        .store-search input::placeholder { color: rgba(255,255,255,0.55); }
        .store-actions { display: flex; align-items: center; gap: 0.6rem; }
        .store-icon-btn { width: 42px; height: 42px; border-radius: 999px; background: var(--glass); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.9); text-decoration: none; transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease; cursor: pointer; }
        .store-icon-btn:hover { transform: translateY(-1px); border-color: rgba(0,240,255,0.6); background: rgba(0,240,255,0.12); }
        .store-nav { max-width: 1200px; margin: 0 auto; padding: 0 1.25rem 0.85rem; }
        .store-nav-list { display: flex; align-items: center; justify-content: center; gap: 0.25rem; list-style: none; }
        .store-nav-item { position: relative; }
        .store-nav-link { font-family: 'Orbitron', sans-serif; font-size: 0.82rem; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; color: rgba(255,255,255,0.85); text-decoration: none; padding: 0.65rem 0.9rem; border-radius: 999px; display: inline-flex; align-items: center; gap: 0.5rem; transition: background 0.2s ease, color 0.2s ease; }
        .store-nav-link:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,1); }
        .store-nav-link[aria-current="page"] { background: rgba(0,240,255,0.14); color: rgba(255,255,255,1); border: 1px solid rgba(0,240,255,0.25); }
        .store-caret { font-size: 0.8rem; opacity: 0.85; }
        .store-dropdown { position: absolute; left: 0; top: calc(100% + 10px); min-width: 240px; background: rgba(10,10,42,0.92); border: 1px solid var(--glass-border); border-radius: 14px; padding: 0.5rem; box-shadow: 0 18px 48px rgba(0,0,0,0.45); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); opacity: 0; visibility: hidden; transform: translateY(-6px); transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s ease; }
        .store-dropdown a { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; padding: 0.7rem 0.8rem; border-radius: 10px; color: rgba(255,255,255,0.88); text-decoration: none; transition: background 0.18s ease, color 0.18s ease; }
        .store-dropdown a:hover { background: rgba(0,240,255,0.12); color: #fff; }
        .store-dropdown small { color: rgba(255,255,255,0.55); font-size: 0.85rem; }
        .store-nav-item:hover .store-dropdown, .store-nav-item.is-open .store-dropdown { opacity: 1; visibility: visible; transform: translateY(0); }
        .store-mobile-toggle { display: none; width: 42px; height: 42px; border-radius: 999px; background: var(--glass); border: 1px solid var(--glass-border); color: rgba(255,255,255,0.9); cursor: pointer; }
        @media(max-width: 900px) { .store-nav { display: none; } .store-mobile-toggle { display: flex; align-items: center; justify-content: center; } }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
        .header { text-align: center; padding: 2rem; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; margin-bottom: 2rem; }
        .title { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent-2)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .subtitle { color: rgba(255,255,255,0.75); }

        .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; padding: 2rem; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        @media(max-width: 900px){ .grid { grid-template-columns: 1fr; } }

        .field { display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-weight: 600; color: rgba(255,255,255,0.9); }
        input, select, textarea {
            padding: 0.9rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        textarea { min-height: 120px; resize: vertical; }

        .actions { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem; }
        .btn {
            padding: 0.9rem 1.4rem;
            border-radius: 12px;
            border: 1px solid transparent;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-3)); color: #000; }
        .btn-secondary { background: #0a0a2a; border-color: var(--glass-border); color: rgba(255,255,255,0.85); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,240,255,0.2); }

        .notice { margin-top: 1rem; padding: 1rem; border-radius: 12px; display: none; }
        .notice.success { display: block; border: 1px solid rgba(0,255,136,0.6); background: rgba(0,255,136,0.08); color: rgba(0,255,136,1); }
        .notice.error { display: block; border: 1px solid rgba(255,0,170,0.6); background: rgba(255,0,170,0.08); color: rgba(255,0,170,1); }

        .order-preview { margin-top: 1.5rem; padding: 1.25rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); }
        .order-preview h3 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; margin-bottom: 0.75rem; }
        .order-items { display: grid; gap: 0.75rem; }
        .order-item { display: flex; gap: 0.75rem; align-items: center; padding: 0.75rem; border-radius: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
        .order-item img { width: 56px; height: 56px; object-fit: cover; border-radius: 10px; }
        .order-item strong { display: block; font-family: 'Orbitron', sans-serif; font-size: 0.95rem; }
        .muted { color: rgba(255,255,255,0.65); font-size: 0.92rem; }
        .pill { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.3rem 0.65rem; border-radius: 999px; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.06); font-size: 0.85rem; }
    </style>
<script src="bg.js"></script>
</head>
<body>
    <canvas id="three-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;"></canvas>
    <div id="header-container" data-type="minimal"></div>
    <div class="container">
        <div class="header">
            <h1 class="title">Return / Exchange</h1>
            <p class="subtitle">Submit a return or exchange request using your order number.</p>
        </div>

        <div class="card">
            <div class="grid">
                <div class="field">
                    <label for="orderNumber">Order Number</label>
                    <input id="orderNumber" placeholder="e.g., TRD-2024-000123" />
                </div>
                <div class="field">
                    <label for="email">Email used on the order</label>
                    <input id="email" type="email" placeholder="you@example.com" />
                </div>

                <div class="field">
                    <label for="requestType">Request Type</label>
                    <select id="requestType">
                        <option value="return">Return</option>
                        <option value="exchange">Exchange</option>
                    </select>
                </div>

                <div class="field">
                    <label for="reason">Reason</label>
                    <select id="reason">
                        <option value="wrong_size">Wrong size</option>
                        <option value="damaged">Arrived damaged</option>
                        <option value="not_as_described">Not as described</option>
                        <option value="changed_mind">Changed my mind</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="field" style="grid-column: 1 / -1;">
                    <label for="comments">Additional details</label>
                    <textarea id="comments" placeholder="Add any helpful details (optional)"></textarea>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-secondary" id="btnLoad">Load Order</button>
                <button class="btn btn-primary" id="btnSubmit" disabled>Submit Request</button>
            </div>

            <div class="notice" id="notice"></div>

            <div class="order-preview" id="orderPreview" style="display:none;">
                <h3>Order Details</h3>
                <div class="muted" style="margin-bottom:0.75rem;">
                    <span class="pill" id="orderStatus">Status: -</span>
                    <span class="pill" id="orderTotal">Total: -</span>
                </div>
                <div class="order-items" id="orderItems"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';

        const elOrderNumber = document.getElementById('orderNumber');
        const elEmail = document.getElementById('email');
        const elBtnLoad = document.getElementById('btnLoad');
        const elBtnSubmit = document.getElementById('btnSubmit');
        const elNotice = document.getElementById('notice');
        const elPreview = document.getElementById('orderPreview');
        const elItems = document.getElementById('orderItems');
        const elStatus = document.getElementById('orderStatus');
        const elTotal = document.getElementById('orderTotal');
        const elRequestType = document.getElementById('requestType');
        const elReason = document.getElementById('reason');
        const elComments = document.getElementById('comments');

        let loadedOrder = null;

        function setNotice(type, msg) {
            elNotice.className = `notice ${type}`;
            elNotice.textContent = msg;
        }

        function clearNotice() {
            elNotice.className = 'notice';
            elNotice.textContent = '';
        }

        function renderOrder(order) {
            elPreview.style.display = 'block';
            elStatus.textContent = `Status: ${order.status || '-'}`;
            elTotal.textContent = `Total: $${Number(order.total || 0).toFixed(2)}`;

            elItems.innerHTML = (order.items || []).map(item => {
                const v = item.variant || {};
                const variantText = [v.size && `Size: ${v.size}`, v.color && `Color: ${v.color}`, v.material && `Material: ${v.material}`, v.style && `Style: ${v.style}`].filter(Boolean).join(' · ');
                return `
                    <div class="order-item">
                        <img src="${item.image || ''}" alt="${item.name || ''}" onerror="this.style.display='none'" />
                        <div>
                            <strong>${item.name || 'Item'}</strong>
                            <div class="muted">Qty: ${item.quantity || 1} · $${Number(item.price || 0).toFixed(2)}</div>
                            ${variantText ? `<div class="muted">${variantText}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function loadOrder() {
            clearNotice();
            elBtnSubmit.disabled = true;
            loadedOrder = null;

            const orderNumber = elOrderNumber.value.trim();
            const email = elEmail.value.trim();
            if (!orderNumber || !email) {
                setNotice('error', 'Please enter order number and email.');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/orders/track/${encodeURIComponent(orderNumber)}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to load order');

                const emailMatches = (data.guestEmail && data.guestEmail === email) || (data.userId && data.userId === email);
                if (!emailMatches) {
                    setNotice('error', 'Order found, but email does not match.');
                    return;
                }

                loadedOrder = data;
                renderOrder(data);
                setNotice('success', 'Order loaded. You can now submit your request.');
                elBtnSubmit.disabled = false;
            } catch (e) {
                setNotice('error', e.message || 'Failed to load order');
            }
        }

        async function submitRequest() {
            clearNotice();
            if (!loadedOrder) {
                setNotice('error', 'Please load your order first.');
                return;
            }

            elBtnSubmit.disabled = true;

            try {
                const payload = {
                    orderNumber: loadedOrder.orderNumber,
                    email: elEmail.value.trim(),
                    type: elRequestType.value,
                    reason: elReason.value,
                    comments: elComments.value.trim()
                };

                const res = await fetch(`${API_BASE}/api/returns/request`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to submit request');

                setNotice('success', `Request submitted! RMA: ${data.rma}`);
            } catch (e) {
                setNotice('error', e.message || 'Failed to submit request');
            } finally {
                elBtnSubmit.disabled = false;
            }
        }

        elBtnLoad.addEventListener('click', loadOrder);
        elBtnSubmit.addEventListener('click', submitRequest);
    </script>
    <div id="footer-container"></div>
    <script src="components.js"></script>

    <!-- Self-Healing System -->
<script>
window.onerror = function(msg, url, lineNo, columnNo, error) {
  console.log('Error caught:', msg);
  const errorDiv = document.createElement('div');
  errorDiv.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#f3f4f6; padding:10px; border-radius:5px; z-index:9999; border:1px solid #ccc;';
  errorDiv.innerHTML = '⚠️ Something went wrong. Retrying...';
  document.body.appendChild(errorDiv);
  setTimeout(() => errorDiv.remove(), 3000);
  return false;
};
</script>
</body>
</html>
