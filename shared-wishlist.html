<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Wishlist - Trendaryo</title>
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="shared.css">
    <script src="performance.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root { --accent: #00f0ff; --accent-2: #ff00aa; --accent-3: #00ff88; --glass: rgba(255,255,255,0.05); --glass-border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: linear-gradient(180deg, #0a0a2a 0%, #1a1a40 100%); color: #fff; overflow-x: hidden; transition: background 1s ease-in-out; }
        #three-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;}

        .store-header { position: fixed; top: 0; left: 0; right: 0; z-index: 10000; 
        param($m)
        $m.Value -replace 'rgba\(0,0,0,0\.(65|72|8|85|9|92)\)', 'rgba(0,0,0,0.08)'
    : blur(18px); border-bottom: 1px solid var(--glass-border); }
        .store-header-inner { max-width: 1200px; margin: 0 auto; padding: 0.8rem 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
        .store-brand { display: flex; align-items: center; gap: 0.75rem; min-width: 180px; }
        .store-logo { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent-2)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; white-space: nowrap; }

        .page-offset { padding-top: 100px; }
        
        .shared-wishlist-container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        
        .shared-header { text-align: center; margin-bottom: 3rem; padding: 2rem; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; }
        .shared-header h1 { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent-2)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }
        .shared-header p { color: rgba(255,255,255,0.8); font-size: 1.1rem; margin-bottom: 1.5rem; }
        .shared-header .share-info { color: var(--accent-3); font-size: 0.9rem; }
        
        .shared-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        
        .shared-product-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden; transition: all 0.3s ease; }
        .shared-product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,240,255,0.2); border-color: var(--accent); }
        
        .shared-product-image { position: relative; height: 250px; overflow: hidden; }
        .shared-product-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .shared-product-card:hover .shared-product-image img { transform: scale(1.05); }
        
        .shared-product-info { padding: 1.5rem; }
        .shared-product-name { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; color: #fff; }
        .shared-product-price { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--accent); margin-bottom: 1rem; }
        .shared-product-price .old-price { color: rgba(255,255,255,0.5); text-decoration: line-through; margin-right: 0.5rem; font-size: 1rem; }
        
        .shared-product-actions { display: flex; gap: 0.75rem; }
        .btn-view-product { flex: 1; padding: 0.875rem; background: linear-gradient(135deg, var(--accent), var(--accent-3)); border: none; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700; color: #000; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; text-decoration: none; text-align: center; }
        .btn-view-product:hover { box-shadow: 0 0 20px rgba(0,240,255,0.5); transform: translateY(-2px); }
        
        .empty-shared { text-align: center; padding: 4rem 2rem; }
        .empty-shared h2 { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; margin-bottom: 1rem; color: #fff; }
        .empty-shared p { color: rgba(255,255,255,0.7); margin-bottom: 2rem; }
        .btn-shop-now { padding: 1rem 2rem; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border: none; border-radius: 12px; font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; color: #fff; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; text-decoration: none; display: inline-block; }
        .btn-shop-now:hover { box-shadow: 0 10px 25px rgba(0,240,255,0.5); transform: translateY(-2px); }
        
        .shared-footer { text-align: center; padding: 2rem; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; }
        .shared-footer h3 { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; margin-bottom: 1rem; color: var(--accent); }
        .shared-footer p { color: rgba(255,255,255,0.8); margin-bottom: 1.5rem; }
        .create-wishlist-btn { padding: 1rem 2rem; background: linear-gradient(135deg, var(--accent-2), var(--accent-3)); border: none; border-radius: 12px; font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; color: #fff; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; text-decoration: none; display: inline-block; }
        .create-wishlist-btn:hover { box-shadow: 0 10px 25px rgba(255,0,170,0.5); transform: translateY(-2px); }
        
        @media (max-width: 768px) {
            .shared-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
            .shared-header { padding: 1.5rem; }
            .shared-header h1 { font-size: 1.5rem; }
        }
    </style>
<script src="bg.js"></script>
</head>
<body>
    <canvas id="three-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;"></canvas>
    
    <!-- Full Navigation Header -->
    <div id="header-container" data-type="full"></div>

    <main class="page-offset">
        <div class="shared-wishlist-container">
            <div class="shared-header">
                <h1 id="wishlistTitle">My Trendaryo Wishlist</h1>
                <p id="wishlistDescription">Check out these amazing products I've found!</p>
                <div class="share-info">
                    <p>💝 Shared via Trendaryo Wishlist</p>
                </div>
            </div>
            
            <div class="shared-grid" id="sharedGrid">
                <!-- Products will be loaded here -->
            </div>
            
            <div class="shared-footer">
                <h3>Create Your Own Wishlist</h3>
                <p>Love these products? Create your own wishlist and share it with friends!</p>
                <a href="index.html" class="create-wishlist-btn">Start Shopping</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer-container"></div>
    <script src="components.js"></script>
    

    <!-- Self-Healing System -->
<script>
window.onerror = function(msg, url, lineNo, columnNo, error) {
  console.log('Error caught:', msg);
  const errorDiv = document.createElement('div');
  errorDiv.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#f3f4f6; padding:10px; border-radius:5px; z-index:9999; border:1px solid #ccc;';
  errorDiv.innerHTML = '⚠️ Something went wrong. Retrying...';
  document.body.appendChild(errorDiv);
  setTimeout(() => errorDiv.remove(), 3000);
  return false;
};
</script>
</body>
</html>
