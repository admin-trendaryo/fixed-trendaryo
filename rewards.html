<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="shared.css">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Trendaryo Rewards - Loyalty Points & Referrals" />
    <title>Rewards - TRENDARYO</title>
    <link rel="stylesheet" href="responsive.css">
    <script src="performance.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />`n    <link rel="stylesheet" href="shared.css">
    <style>
        :root { --accent:#00f0ff; --accent2:#ff00aa; --accent3:#00ff88; --glass:rgba(255,255,255,0.05); --glassBorder:rgba(255,255,255,0.1); }
        * { box-sizing: border-box; }
        body { margin:0; font-family: Rajdhani, sans-serif; background: linear-gradient(180deg,#0a0a2a 0%,#1a1a40 100%); color:#fff; }
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; padding-top: 180px; }
        .hero { background: var(--glass); border: 1px solid var(--glassBorder); border-radius: 20px; padding: 2rem; text-align:center; }
        .title { font-family: Orbitron, sans-serif; font-size: 2.2rem; font-weight: 900; background: linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color: transparent; margin:0 0 0.5rem; }
        .subtitle { color: rgba(255,255,255,0.75); margin:0; }

        .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem; }
        @media(max-width: 900px){ .grid { grid-template-columns: 1fr; } }

        .card { background: var(--glass); border: 1px solid var(--glassBorder); border-radius: 16px; padding: 1.5rem; }
        .card h2 { font-family: Orbitron, sans-serif; font-size: 1.1rem; margin:0 0 1rem; }

        .statRow { display:grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .stat { padding: 1rem; border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
        .stat strong { display:block; font-family: Orbitron, sans-serif; font-size: 1.4rem; }
        .muted { color: rgba(255,255,255,0.7); font-size: 0.95rem; }

        .field { display:flex; flex-direction: column; gap: 0.5rem; margin-top: 0.75rem; }
        label { font-weight: 600; color: rgba(255,255,255,0.9); }
        input { padding: 0.85rem 1rem; border-radius: 12px; border: 1px solid var(--glassBorder); background: rgba(255,255,255,0.06); color:#fff; outline: none; }

        .row { display:flex; gap: 0.75rem; flex-wrap: wrap; }
        .btn { padding: 0.85rem 1.2rem; border-radius: 12px; border: 1px solid transparent; cursor:pointer; font-family: Orbitron, sans-serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .btnPrimary { background: linear-gradient(135deg,var(--accent),var(--accent3)); color:#000; }
        .btnGhost { background: #0a0a2a; border-color: rgba(255,255,255,0.18); color: rgba(255,255,255,0.9); }

        .notice { margin-top: 0.75rem; padding: 0.85rem 1rem; border-radius: 12px; display:none; }
        .notice.success { display:block; border: 1px solid rgba(0,255,136,0.6); background: rgba(0,255,136,0.08); color: rgba(0,255,136,1); }
        .notice.error { display:block; border: 1px solid rgba(255,0,170,0.6); background: rgba(255,0,170,0.08); color: rgba(255,0,170,1); }

        .history { margin-top: 1rem; display:grid; gap: 0.75rem; }
        .event { padding: 0.85rem 1rem; border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
        .event strong { font-family: Orbitron, sans-serif; font-size: 0.95rem; }
        .event small { display:block; color: rgba(255,255,255,0.65); margin-top: 0.3rem; }

        .code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
<script src="bg.js"></script>
</head>
<body>
    <canvas id="three-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;"></canvas>
    <div id="header-container" data-type="full"></div>
    <div class="container">
        <div class="hero">
            <h1 class="title">Trendaryo Rewards</h1>
            <p class="subtitle">Earn points on every purchase and get bonuses by referring friends.</p>
        </div>

        <div class="grid">
            <div class="card">
                <h2>My Rewards</h2>
                <div class="statRow">
                    <div class="stat">
                        <strong id="points">-</strong>
                        <div class="muted">Loyalty points</div>
                    </div>
                    <div class="stat">
                        <strong id="credit">-</strong>
                        <div class="muted">Store credit ($)</div>
                    </div>
                </div>

                <div class="field">
                    <label for="redeem">Redeem points to credit (100 pts = $1)</label>
                    <input id="redeem" type="number" min="100" step="100" placeholder="e.g., 500" />
                </div>

                <div class="row" style="margin-top: 0.9rem;">
                    <button class="btn btnPrimary" id="btnRedeem">Redeem</button>
                    <button class="btn btnGhost" id="btnRefresh">Refresh</button>
                </div>

                <div class="notice" id="notice"></div>
            </div>

            <div class="card">
                <h2>Referrals</h2>
                <div class="muted">Share your referral code with friends. They can enter it at registration.</div>

                <div class="field">
                    <label>Your referral code</label>
                    <input id="refCode" class="code" readonly />
                </div>

                <div class="field">
                    <label>Referral link</label>
                    <input id="refLink" class="code" readonly />
                </div>

                <div class="row" style="margin-top: 0.9rem;">
                    <button class="btn btnPrimary" id="btnCopy">Copy Link</button>
                    <button class="btn btnGhost" id="btnCopyCode">Copy Code</button>
                </div>

                <div class="notice" id="copyNotice"></div>
            </div>
        </div>

        <div class="card" style="margin-top: 1.5rem;">
            <h2>Recent Activity</h2>
            <div class="history" id="history"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';

        const elPoints = document.getElementById('points');
        const elCredit = document.getElementById('credit');
        const elRefCode = document.getElementById('refCode');
        const elRefLink = document.getElementById('refLink');
        const elRedeem = document.getElementById('redeem');
        const elNotice = document.getElementById('notice');
        const elCopyNotice = document.getElementById('copyNotice');
        const elHistory = document.getElementById('history');

        function getToken() {
            return localStorage.getItem('token') || '';
        }

        function setNotice(el, type, msg) {
            el.className = `notice ${type}`;
            el.textContent = msg;
        }

        function clearNotice(el) {
            el.className = 'notice';
            el.textContent = '';
        }

        function renderHistory(items) {
            if (!items || items.length === 0) {
                elHistory.innerHTML = `<div class="muted">No reward activity yet.</div>`;
                return;
            }

            elHistory.innerHTML = items.map(e => {
                const pts = e.points;
                const sign = pts > 0 ? '+' : '';
                return `
                    <div class="event">
                        <strong>${e.type} <span class="code">(${sign}${pts})</span></strong>
                        <small>${new Date(e.createdAt).toLocaleString()}</small>
                    </div>
                `;
            }).join('');
        }

        async function refresh() {
            clearNotice(elNotice);
            try {
                const res = await fetch(`${API_BASE}/api/rewards/me`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to load rewards');

                elPoints.textContent = String(data.loyaltyPoints ?? 0);
                elCredit.textContent = String(data.storeCredit ?? 0);
                elRefCode.value = data.referralCode || '';

                const link = `${window.location.origin}/register.html?ref=${encodeURIComponent(data.referralCode || '')}`;
                elRefLink.value = link;

                renderHistory(data.history || []);
            } catch (e) {
                setNotice(elNotice, 'error', e.message || 'Failed to load rewards');
            }
        }

        async function redeem() {
            clearNotice(elNotice);
            const pts = parseInt(elRedeem.value, 10);
            if (!pts || pts <= 0) {
                setNotice(elNotice, 'error', 'Enter points to redeem (minimum 100).');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/rewards/redeem`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({ points: pts })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Redeem failed');

                setNotice(elNotice, 'success', `Redeemed ${data.usedPoints} points for $${data.creditAdded} credit.`);
                await refresh();
            } catch (e) {
                setNotice(elNotice, 'error', e.message || 'Redeem failed');
            }
        }

        async function copy(text) {
            try {
                await navigator.clipboard.writeText(text);
                return true;
            } catch {
                return false;
            }
        }

        document.getElementById('btnRefresh').addEventListener('click', refresh);
        document.getElementById('btnRedeem').addEventListener('click', redeem);
        document.getElementById('btnCopy').addEventListener('click', async () => {
            clearNotice(elCopyNotice);
            const ok = await copy(elRefLink.value);
            setNotice(elCopyNotice, ok ? 'success' : 'error', ok ? 'Referral link copied.' : 'Copy failed.');
        });
        document.getElementById('btnCopyCode').addEventListener('click', async () => {
            clearNotice(elCopyNotice);
            const ok = await copy(elRefCode.value);
            setNotice(elCopyNotice, ok ? 'success' : 'error', ok ? 'Referral code copied.' : 'Copy failed.');
        });

        refresh();
    </script>
    <div id="footer-container"></div>
    <script src="components.js"></script>

    <!-- Self-Healing System -->
<script>
window.onerror = function(msg, url, lineNo, columnNo, error) {
  console.log('Error caught:', msg);
  const errorDiv = document.createElement('div');
  errorDiv.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#f3f4f6; padding:10px; border-radius:5px; z-index:9999; border:1px solid #ccc;';
  errorDiv.innerHTML = '⚠️ Something went wrong. Retrying...';
  document.body.appendChild(errorDiv);
  setTimeout(() => errorDiv.remove(), 3000);
  return false;
};
</script>
</body>
</html>
