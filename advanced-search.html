<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="shared.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Advanced search with filters - Trendaryo">
    <title>Advanced Search - TRENDARYO</title>
    <link rel="stylesheet" href="responsive.css">
    <script src="performance.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">`n    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="styles.css">
    <script src="bg.js"></script>
    <style>
        :root { --accent: #00f0ff; --accent-2: #ff00aa; --accent-3: #00ff88; --glass: rgba(255,255,255,0.05); --glass-border: rgba(255,255,255,0.1); }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: #0a0a2a; color: #fff; overflow-x: hidden; transition: background 1s ease-in-out; }
        #three-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;}

        .search-container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        
        .search-header { text-align: center; margin-bottom: 2rem; }
        .search-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent-2)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }
        
        .search-form { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .search-input-group { flex: 1; position: relative; }
        .search-input { width: 100%; padding: 1rem 1.5rem; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 50px; color: #fff; font-size: 1.1rem; transition: all 0.3s ease; }
        .search-input:focus { outline: none; border-color: var(--accent); background: rgba(0,240,255,0.05); box-shadow: 0 0 20px rgba(0,240,255,0.2); }
        .search-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; max-height: 300px; overflow-y: auto; z-index: 1000; display: none; }
        .suggestion-item { padding: 0.75rem 1rem; cursor: pointer; transition: background 0.2s ease; }
        .suggestion-item:hover { background: rgba(0,240,255,0.1); }
        
        .search-button { padding: 1rem 2rem; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border: none; border-radius: 50px; color: #fff; font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; }
        .search-button:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,240,255,0.5); }
        
        .filters-section { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; padding: 2rem; margin-bottom: 2rem; }
        
        .filters-title { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 1.5rem; }
        
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        
        .filter-group { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 12px; padding: 1.5rem; }
        .filter-label { display: block; margin-bottom: 0.75rem; color: rgba(255,255,255,0.9); font-weight: 600; font-size: 0.9rem; }
        
        .filter-options { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .filter-option { padding: 0.5rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 20px; color: rgba(255,255,255,0.8); cursor: pointer; transition: all 0.2s ease; }
        .filter-option:hover, .filter-option.active { background: var(--accent); color: #000; border-color: var(--accent); }
        
        .price-range { display: flex; align-items: center; gap: 1rem; margin-top: 1rem; }
        .price-input { width: 120px; padding: 0.5rem; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff; }
        
        .results-section { margin-top: 2rem; }
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .results-count { color: rgba(255,255,255,0.8); font-size: 1rem; }
        .sort-dropdown { padding: 0.5rem 1rem; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff; cursor: pointer; }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        
        .product-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden; transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,240,255,0.2); border-color: var(--accent); }
        
        .product-image { position: relative; height: 200px; overflow: hidden; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .product-card:hover .product-image img { transform: scale(1.05); }
        
        .product-badges { position: absolute; top: 1rem; left: 1rem; display: flex; gap: 0.5rem; }
        .product-badge { padding: 0.25rem 0.75rem; background: var(--accent-2); color: #fff; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        
        .product-info { padding: 1.5rem; }
        .product-title { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
        .product-price { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--accent); margin-bottom: 0.5rem; }
        .product-old-price { color: rgba(255,255,255,0.5); text-decoration: line-through; margin-right: 0.5rem; }
        
        .product-variants { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .variant-option { padding: 0.5rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 8px; color: rgba(255,255,255,0.8); cursor: pointer; transition: all 0.2s ease; }
        .variant-option:hover, .variant-option.active { background: var(--accent); color: #000; border-color: var(--accent); }
        
        .product-actions { display: flex; gap: 0.75rem; }
        .add-to-cart { flex: 1; padding: 0.75rem 1.5rem; background: linear-gradient(135deg, var(--accent), var(--accent-3)); border: none; border-radius: 8px; color: #000; font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; }
        .add-to-cart:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,240,255,0.5); }
        
        .wishlist-btn { padding: 0.75rem 1.5rem; background: #0a0a2a; border: 2px solid var(--accent-2); border-radius: 8px; color: var(--accent-2); font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; }
        .wishlist-btn:hover { background: var(--accent-2); color: #fff; }
        
        .pagination { display: flex; justify-content: center; align-items: center; gap: 1rem; margin-top: 3rem; }
        .page-btn { padding: 0.75rem 1.5rem; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 8px; color: rgba(255,255,255,0.8); cursor: pointer; transition: all 0.3s ease; }
        .page-btn:hover, .page-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .no-results { text-align: center; padding: 4rem 2rem; }
        .no-results h2 { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 700; color: #fff; margin-bottom: 1rem; }
        .no-results p { color: rgba(255,255,255,0.8); font-size: 1.1rem; margin-bottom: 2rem; }
        
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--accent); border-radius: 50%; border-top-color: transparent; border-right-color: transparent; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            .search-form { flex-direction: column; }
            .filters-grid { grid-template-columns: 1fr; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
        }
    </style>
<script src="bg.js"></script>
</head>
<body>`n    <div id="header-container" data-type="full"></div>
    <canvas id="three-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;"></canvas>
    
    <div class="search-container">
        <div class="search-header">
            <h1 class="search-title">Advanced Search</h1>
        </div>
        
        <form class="search-form" onsubmit="performSearch(event)">
            <div class="search-input-group">
                <input type="text" class="search-input" id="searchInput" placeholder="Search products..." autocomplete="off">
                <div class="search-suggestions" id="searchSuggestions"></div>
            </div>
            <button type="submit" class="search-button">Search</button>
        </form>
        
        <div class="filters-section">
            <h2 class="filters-title">Filters</h2>
            
            <div class="filters-grid">
                <div class="filter-group">
                    <label class="filter-label">Category</label>
                    <div class="filter-options">
                        <div class="filter-option active" onclick="selectFilter('category', 'all')">All</div>
                        <div class="filter-option" onclick="selectFilter('category', 'electronics')">Electronics</div>
                        <div class="filter-option" onclick="selectFilter('category', 'fashion')">Fashion</div>
                        <div class="filter-option" onclick="selectFilter('category', 'accessories')">Accessories</div>
                    </div>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">Price Range</label>
                    <div class="price-range">
                        <input type="number" class="price-input" id="minPrice" placeholder="Min" min="0">
                        <span style="color: rgba(255,255,255,0.6);">-</span>
                        <input type="number" class="price-input" id="maxPrice" placeholder="Max" min="0">
                    </div>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">Brand</label>
                    <div class="filter-options">
                        <div class="filter-option" onclick="selectFilter('brand', 'all')">All Brands</div>
                        <div class="filter-option" onclick="selectFilter('brand', 'trendaryo')">Trendaryo</div>
                        <div class="filter-option" onclick="selectFilter('brand', 'elite')">Elite</div>
                        <div class="filter-option" onclick="selectFilter('brand', 'luxe')">Luxe</div>
                    </div>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">Size</label>
                    <div class="filter-options">
                        <div class="filter-option" onclick="selectFilter('size', 'all')">All Sizes</div>
                        <div class="filter-option" onclick="selectFilter('size', 'xs')">XS</div>
                        <div class="filter-option" onclick="selectFilter('size', 's')">S</div>
                        <div class="filter-option" onclick="selectFilter('size', 'm')">M</div>
                        <div class="filter-option" onclick="selectFilter('size', 'l')">L</div>
                        <div class="filter-option" onclick="selectFilter('size', 'xl')">XL</div>
                    </div>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">Color</label>
                    <div class="filter-options">
                        <div class="filter-option" onclick="selectFilter('color', 'all')">All Colors</div>
                        <div class="filter-option" onclick="selectFilter('color', 'black')">Black</div>
                        <div class="filter-option" onclick="selectFilter('color', 'white')">White</div>
                        <div class="filter-option" onclick="selectFilter('color', 'red')">Red</div>
                        <div class="filter-option" onclick="selectFilter('color', 'blue')">Blue</div>
                        <div class="filter-option" onclick="selectFilter('color', 'green')">Green</div>
                    </div>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">Rating</label>
                    <div class="filter-options">
                        <div class="filter-option" onclick="selectFilter('rating', 'all')">All Ratings</div>
                        <div class="filter-option" onclick="selectFilter('rating', '4')">4+ Stars</div>
                        <div class="filter-option" onclick="selectFilter('rating', '3')">3+ Stars</div>
                        <div class="filter-option" onclick="selectFilter('rating', '2')">2+ Stars</div>
                        <div class="filter-option" onclick="selectFilter('rating', '1')">1 Star</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="results-section">
            <div class="results-header">
                <div class="results-count" id="resultsCount">0 Results</div>
                <select class="sort-dropdown" id="sortDropdown" onchange="changeSortOrder(this.value)">
                    <option value="relevance">Most Relevant</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="rating">Highest Rated</option>
                    <option value="newest">Newest First</option>
                    <option value="name">Name: A to Z</option>
                </select>
            </div>
            
            <div class="products-grid" id="productsGrid">
                <!-- Products will be loaded here -->
            </div>
            
            <div class="pagination" id="pagination">
                <!-- Pagination will be loaded here -->
            </div>
            
            <div class="no-results" id="noResults" style="display: none;">
                <h2>No products found</h2>
                <p>Try adjusting your filters or search terms</p>
                <button class="add-to-cart" onclick="clearFilters()">Clear Filters</button>
            </div>
        </div>
    </div>

    <script>
        // Mock product data with variants
        const products = [
            {
                id: 1,
                name: "Premium Wireless Headphones",
                price: 249,
                oldPrice: 299,
                image: "https://images.unsplash.com/photo-1505740420928-47898b6baf30?w=500&h=500&fit=crop",
                category: "electronics",
                brand: "trendaryo",
                rating: 5,
                reviews: 342,
                badge: "Hot",
                variants: [
                    { id: "1-black", name: "Black", price: 249, stock: 15, color: "black" },
                    { id: "1-white", name: "White", price: 249, stock: 8, color: "white" },
                    { id: "1-blue", name: "Blue", price: 249, stock: 12, color: "blue" }
                ]
            },
            {
                id: 2,
                name: "Designer Leather Jacket",
                price: 189,
                oldPrice: null,
                image: "https://images.unsplash.com/photo-1551488830-4181-754e-41c0e57?w=500&h=500&fit=crop",
                category: "fashion",
                brand: "elite",
                rating: 5,
                reviews: 203,
                variants: [
                    { id: "2-xs", name: "XS", price: 189, stock: 5 },
                    { id: "2-s", name: "S", price: 189, stock: 10 },
                    { id: "2-m", name: "M", price: 189, stock: 8 },
                    { id: "2-l", name: "L", price: 189, stock: 12 },
                    { id: "2-xl", name: "XL", price: 189, stock: 3 }
                ]
            },
            {
                id: 3,
                name: "Smart Fitness Band",
                price: 99,
                oldPrice: 149,
                image: "https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=500&h=500&fit=crop",
                category: "electronics",
                brand: "nova",
                rating: 4,
                reviews: 89,
                badge: "New",
                variants: [
                    { id: "3-black", name: "Black", price: 99, stock: 20 },
                    { id: "3-blue", name: "Blue", price: 99, stock: 15 },
                    { id: "3-pink", name: "Pink", price: 99, stock: 10 }
                ]
            }
        ];
        
        let currentFilters = {
            category: 'all',
            brand: 'all',
            size: 'all',
            color: 'all',
            rating: 'all',
            minPrice: 0,
            maxPrice: 0
        };
        
        let currentSort = 'relevance';
        let currentPage = 1;
        const itemsPerPage = 12;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            renderProducts();
            setupSearchSuggestions();
        });
        
        function setupSearchSuggestions() {
            const searchInput = document.getElementById('searchInput');
            const suggestionsDiv = document.getElementById('searchSuggestions');
            
            searchInput.addEventListener('input', function(e) {
                const query = e.target.value.toLowerCase();
                if (query.length < 2) {
                    suggestionsDiv.style.display = 'none';
                    return;
                }
                
                const suggestions = products
                    .filter(p => p.name.toLowerCase().includes(query))
                    .slice(0, 5)
                    .map(p => p.name);
                
                if (suggestions.length > 0) {
                    suggestionsDiv.innerHTML = suggestions.map(s => 
                        `<div class="suggestion-item" onclick="selectSuggestion('${s}')">${s}</div>`
                    ).join('');
                    suggestionsDiv.style.display = 'block';
                } else {
                    suggestionsDiv.style.display = 'none';
                }
            });
            
            document.addEventListener('click', function(e) {
                if (!suggestionsDiv.contains(e.target)) {
                    suggestionsDiv.style.display = 'none';
                }
            });
        }
        
        function selectSuggestion(suggestion) {
            document.getElementById('searchInput').value = suggestion;
            document.getElementById('searchSuggestions').style.display = 'none';
            performSearch(new Event('submit'));
        }
        
        function performSearch(event) {
            event.preventDefault();
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            if (!query) {
                renderProducts();
                return;
            }
            
            const filteredProducts = products.filter(product => {
                const matchesSearch = product.name.toLowerCase().includes(query);
                const matchesCategory = currentFilters.category === 'all' || product.category === currentFilters.category;
                const matchesBrand = currentFilters.brand === 'all' || product.brand === currentFilters.brand;
                const matchesSize = currentFilters.size === 'all' || product.variants.some(v => v.name === currentFilters.size);
                const matchesColor = currentFilters.color === 'all' || product.variants.some(v => v.color === currentFilters.color);
                const matchesRating = currentFilters.rating === 'all' || product.rating >= parseInt(currentFilters.rating);
                const matchesPrice = product.price >= currentFilters.minPrice && product.price <= currentFilters.maxPrice;
                
                return matchesSearch && matchesCategory && matchesBrand && matchesSize && matchesColor && matchesRating && matchesPrice;
            });
            
            renderProducts(filteredProducts);
        }
        
        function selectFilter(filterType, value) {
            // Update filter state
            currentFilters[filterType] = value;
            
            // Update UI
            const filterOptions = document.querySelectorAll(`.filter-option[onclick*="${filterType}"]`);
            filterOptions.forEach(option => {
                option.classList.remove('active');
                if (option.textContent.toLowerCase().includes(value.toLowerCase()) || 
                    (value === 'all' && option.textContent === 'All')) {
                    option.classList.add('active');
                }
            });
            
            performSearch(new Event('submit'));
        }
        
        function changeSortOrder(sortType) {
            currentSort = sortType;
            currentPage = 1;
            performSearch(new Event('submit'));
        }
        
        function renderProducts(productsToRender = products) {
            const productsGrid = document.getElementById('productsGrid');
            const resultsCount = document.getElementById('resultsCount');
            const noResults = document.getElementById('noResults');
            const pagination = document.getElementById('pagination');
            
            const filteredCount = productsToRender.length;
            resultsCount.textContent = `${filteredCount} Results`;
            
            if (filteredCount === 0) {
                productsGrid.style.display = 'none';
                noResults.style.display = 'block';
                pagination.style.display = 'none';
                return;
            }
            
            productsGrid.style.display = 'grid';
            noResults.style.display = 'none';
            
            // Sort products
            const sortedProducts = [...productsToRender].sort((a, b) => {
                switch (currentSort) {
                    case 'price-low':
                        return a.price - b.price;
                    case 'price-high':
                        return b.price - a.price;
                    case 'rating':
                        return b.rating - a.rating;
                    case 'newest':
                        return b.id - a.id;
                    case 'name':
                        return a.name.localeCompare(b.name);
                    default:
                        return 0;
                }
            });
            
            // Paginate
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedProducts = sortedProducts.slice(startIndex, endIndex);
            
            productsGrid.innerHTML = paginatedProducts.map(product => `
                <div class="product-card">
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}">
                        ${product.badge ? `<span class="product-badge">${product.badge}</span>` : ''}
                    </div>
                    
                    <div class="product-badges">
                        ${product.variants && product.variants.length > 1 ? 
                            `<span class="product-badge">${product.variants.length} Options</span>` : ''}
                    </div>
                    
                    <div class="product-info">
                        <h3 class="product-title">${product.name}</h3>
                        <div class="product-price">
                            ${product.oldPrice ? 
                                `<span class="product-old-price">$${product.oldPrice}</span>` : ''}
                            $${product.price}
                        </div>
                        
                        ${product.variants && product.variants.length > 1 ? `
                            <div class="product-variants">
                                <div class="filter-label">Options:</div>
                                <div class="filter-options">
                                    ${product.variants.map(variant => 
                                        `<div class="variant-option">${variant.name}</div>`
                                    ).join('')}
                                </div>
                            </div>
                        ` : ''}
                        
                        <div class="product-actions">
                            <button class="add-to-cart" onclick="addToCart(${product.id})">Add to Cart</button>
                            <button class="wishlist-btn" onclick="addToWishlist(${product.id})">♡</button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Render pagination
            const totalPages = Math.ceil(filteredCount / itemsPerPage);
            if (totalPages > 1) {
                let paginationHTML = '';
                
                // Previous button
                paginationHTML += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">←</button>`;
                
                // Page numbers
                for (let i = Math.max(1, currentPage - 2); i <= Math.min(currentPage + 2, totalPages); i++) {
                    paginationHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                }
                
                // Next button
                paginationHTML += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">→</button>`;
                
                pagination.innerHTML = paginationHTML;
            } else {
                pagination.style.display = 'none';
            }
        }
        
        function goToPage(page) {
            currentPage = page;
            performSearch(new Event('submit'));
        }
        
        function clearFilters() {
            currentFilters = {
                category: 'all',
                brand: 'all',
                size: 'all',
                color: 'all',
                rating: 'all',
                minPrice: 0,
                maxPrice: 0
            };
            
            // Reset UI
            document.querySelectorAll('.filter-option').forEach(option => {
                option.classList.remove('active');
                if (option.textContent === 'All') {
                    option.classList.add('active');
                }
            });
            
            performSearch(new Event('submit'));
        }
        
        function addToCart(productId) {
            console.log('Adding to cart:', productId);
            // Show notification
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed; top: 20px; right: 20px; background: var(--accent); color: #000; padding: 1rem 1.5rem; border-radius: 8px; z-index: 10000; font-family: 'Rajdhani', sans-serif; font-weight: 600; animation: slideIn 0.3s ease;
            `;
            notification.textContent = '✓ Added to cart!';
