<head>

    <title>Compare Products - Trendaryo</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/favicon-crown-star.svg">
    <style>
        :root {
            --accent: #00f0ff;
            --accent-2: #ff00aa;
            --accent-3: #00ff88;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #0a0a2a;
            color: #fff;
            overflow-x: hidden;
            transition: background 1s ease-in-out;
        }

        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
            pointer-events: none;
        }

        .page-offset { 
            padding-top: 150px; 
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }

        .compare-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .compare-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.2rem, 5vw, 3.4rem);
            font-weight: 900;
            background: linear-gradient(135deg, #fff, var(--accent));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.6rem;
        }

        .compare-header p {
            color: rgba(255,255,255,0.7);
            font-size: 1.15rem;
        }
        
        .compare-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .compare-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            backdrop-filter: blur(10px);
        }
        
        .compare-card.selected {
            border-color: rgba(0, 240, 255, 0.45);
            box-shadow: 0 0 35px rgba(0, 240, 255, 0.12);
        }
        
        .compare-card .remove-compare {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.10);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            color: rgba(255,255,255,0.85);
        }
        
        .compare-card .remove-compare:hover {
            background: #ef4444;
            color: white;
        }
        
        .compare-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            margin-bottom: 1rem;
        }
        
        .compare-card h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            font-family: 'Orbitron', sans-serif;
        }
        
        .compare-card .price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .compare-card .old-price {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.55);
            text-decoration: line-through;
            margin-left: 0.5rem;
        }
        
        .compare-empty {
            text-align: center;
            padding: 4rem 2rem;
        }
        
        .compare-empty svg {
            width: 100px;
            height: 100px;
            color: rgba(255,255,255,0.25);
            margin-bottom: 1rem;
        }

        .compare-empty p {
            color: rgba(255,255,255,0.65);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.95rem 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.92);
            text-decoration: none;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.8px;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            border-color: rgba(0,240,255,0.55);
            background: rgba(0,240,255,0.10);
        }

        .btn-primary {
            background: linear-gradient(135deg, rgba(0,240,255,0.30), rgba(0,255,136,0.20));
            border-color: rgba(0,240,255,0.35);
            color: #fff;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, rgba(0,240,255,0.40), rgba(0,255,136,0.26));
        }

        .btn-secondary {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.14);
            color: rgba(255,255,255,0.92);
        }

        .btn-secondary:hover {
            border-color: rgba(0,240,255,0.55);
            background: rgba(0,240,255,0.10);
        }
        
        .add-more-btn {
            text-align: center;
            margin: 2rem 0;
        }
        
        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 18px 45px rgba(0,0,0,0.22);
            backdrop-filter: blur(10px);
        }
        
        .comparison-table th,
        .comparison-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .comparison-table th {
            background: rgba(255,255,255,0.06);
            font-weight: 600;
            width: 20%;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.6px;
        }
        
        .comparison-table td {
            text-align: center;
        }
        
        .comparison-table .product-col {
            width: 25%;
        }
        
        .comparison-table img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }
        
        .spec-row:nth-child(even) {
            background: rgba(255,255,255,0.03);
        }
        
        .check-icon {
            color: #10b981;
            font-size: 1.2rem;
        }
        
        .cross-icon {
            color: #ef4444;
            font-size: 1.2rem;
        }

        @media(max-width:900px){
            .page-offset { padding-top: 120px; }
            .container { padding-left: 1rem; padding-right: 1rem; }
        }
    </style>
<script src="bg.js"></script>
</head>
<body>
    <script src="components.js"></script>
    <canvas id="three-canvas"></canvas>

    <!-- Header will be injected by components.js -->

    <!-- Main Content -->
    <main class="page-offset" style="padding-bottom: 4rem;">
        <div class="container">
            <div class="compare-header">
                <h1>Compare Products</h1>
                <p>Compare up to 4 products side by side</p>
            </div>

            <div id="compare-products" class="compare-grid">
                <!-- Compare products will be shown here -->
            </div>

            <div class="add-more-btn">
                <a href="shop.html" class="btn btn-secondary">+ Add More Products</a>
            </div>

            <div id="comparison-table-container" style="display: none;">
                <table class="comparison-table">
                    <thead>
                        <tr id="comparison-header">
                            <!-- Headers will be dynamically added -->
                        </tr>
                    </thead>
                    <tbody id="comparison-body">
                        <!-- Comparison rows will be dynamically added -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Footer will be injected by components.js -->

    <script src="script.js?v=2024022401"></script>
    <script>
        // Force cache refresh
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }
    </script>
    <script>
        // Wait for script.js to load before initializing compare functionality
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize compare products storage
            let compareList = JSON.parse(localStorage.getItem('compare_list')) || [];
            
            function saveCompareList() {
                localStorage.setItem('compare_list', JSON.stringify(compareList));
            }
            
            function renderCompareProducts() {
                const container = document.getElementById('compare-products');
                
                if (compareList.length === 0) {
                    container.innerHTML = `
                        <div class="compare-empty" style="grid-column: 1 / -1;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                                <line x1="18" y1="20" x2="18" y2="10"></line>
                                <line x1="12" y1="20" x2="12" y2="4"></line>
                                <line x1="6" y1="20" x2="6" y2="14"></line>
                            </svg>
                            <h2>No Products to Compare</h2>
                            <p>Add products to compare from the shop page!</p>
                            <a href="shop.html" class="btn btn-primary">Browse Products</a>
                        </div>
                    `;
                    const tableContainer = document.getElementById('comparison-table-container');
                    if (tableContainer) tableContainer.style.display = 'none';
                    return;
                }
                
                container.innerHTML = compareList.map((product, index) => `
                    <div class="compare-card selected">
                        <button class="remove-compare" onclick="removeFromCompare(${index})">✕</button>
                        <a href="product.html?id=${product.id}">
                            <img src="${product.image}" alt="${product.name}">
                        </a>
                        <h3>${product.name}</h3>
                        <div>
                            <span class="price">$${(product.price || 0).toFixed(2)}</span>
                            ${product.oldPrice ? `<span class="old-price">$${product.oldPrice.toFixed(2)}</span>` : ''}
                        </div>
                        <button onclick="addToCartQuickById(${product.id})" class="btn btn-primary" style="margin-top: 1rem; width: 100%;">Add to Cart</button>
                    </div>
                `).join('');
                
                // Add "add product" card if less than 4
                if (compareList.length < 4) {
                    container.innerHTML += `
                        <div class="compare-card" style="display: flex; align-items: center; justify-content: center; min-height: 300px;">
                            <a href="shop.html" style="text-decoration: none; color: #666;">
                                <div style="text-align: center;">
                                    <div style="font-size: 3rem;">+</div>
                                    <p>Add Product</p>
                                </div>
                            </a>
                        </div>
                    `;
                }
                
                renderComparisonTable();
            }
            
            function renderComparisonTable() {
                if (compareList.length < 2) {
                    const tableContainer = document.getElementById('comparison-table-container');
                    if (tableContainer) tableContainer.style.display = 'none';
                    return;
                }
                
                const tableContainer = document.getElementById('comparison-table-container');
                if (tableContainer) tableContainer.style.display = 'block';
                
                // Render header
                const headerRow = document.getElementById('comparison-header');
                if (headerRow) {
                    headerRow.innerHTML = `
                        <th class="product-col">Feature</th>
                        ${compareList.map(p => `
                            <th class="product-col">
                                <img src="${p.image}" alt="${p.name}">
                                <p>${p.name}</p>
                            </th>
                        `).join('')}
                    `;
                }
                
                // Render comparison rows
                const tbody = document.getElementById('comparison-body');
                if (tbody) {
                    tbody.innerHTML = `
                        <tr class="spec-row">
                            <th>Price</th>
                            ${compareList.map(p => `<td>$${(p.price || 0).toFixed(2)}</td>`).join('')}
                        </tr>
                        <tr>
                            <th>Category</th>
                            ${compareList.map(p => `<td>${p.category || 'N/A'}</td>`).join('')}
                        </tr>
                        <tr class="spec-row">
                            <th>Rating</th>
                            ${compareList.map(p => `<td>⭐ ${(p.rating || 0).toFixed(1)} (${p.reviews || 0} reviews)</td>`).join('')}
                        </tr>
                        <tr>
                            <th>Stock</th>
                            ${compareList.map(p => `<td>${(p.stock || 0) > 0 ? '✅ In Stock' : '❌ Out of Stock'}</td>`).join('')}
                        </tr>
                        <tr class="spec-row">
                            <th>Description</th>
                            ${compareList.map(p => `<td>${p.description ? p.description.substring(0, 100) + '...' : 'N/A'}</td>`).join('')}
                        </tr>
                        <tr>
                            <th>Features</th>
                            ${compareList.map(p => `
                                <td>
                                    ${p.features ? p.features.slice(0, 3).map(f => `• ${f}`).join('<br>') : 'N/A'}
                                </td>
                            `).join('')}
                        </tr>
                        <tr class="spec-row">
                            <th>Action</th>
                            ${compareList.map(p => `
                                <td><button onclick="addToCartQuickById(${p.id})" class="btn btn-primary">Add to Cart</button></td>
                            `).join('')}
                        </tr>
                    `;
                }
            }
            
            function removeFromCompare(index) {
                compareList.splice(index, 1);
                saveCompareList();
                renderCompareProducts();
            }
            
            function addToCartQuickById(productId) {
                // Check if addToCart function is available from script.js
                if (typeof window.addToCart === 'function') {
                    window.addToCart(productId, 1);
                } else {
                    console.error('addToCart function not available');
                    // Fallback notification
                    if (typeof window.showNotification === 'function') {
                        window.showNotification('Adding to cart...', 'info');
                    }
                }
            }
            
            // Add to compare from anywhere
            window.addToCompare = function(product) {
                if (compareList.length >= 4) {
                    if (typeof window.showNotification === 'function') {
                        window.showNotification('Maximum 4 products can be compared', 'error');
                    }
                    return;
                }
                
                if (compareList.find(p => p.id === product.id)) {
                    if (typeof window.showNotification === 'function') {
                        window.showNotification('Product already in compare list', 'info');
                    }
                    return;
                }
                
                compareList.push(product);
                saveCompareList();
                if (typeof window.showNotification === 'function') {
                    window.showNotification('Added to compare list', 'success');
                }
                renderCompareProducts();
            };
            
            // Make functions globally available
            window.removeFromCompare = removeFromCompare;
            window.addToCartQuickById = addToCartQuickById;
            
            // Initialize the compare page
            renderCompareProducts();
        });
    </script>
    <!-- Self-Healing System -->
<script>
window.onerror = function(msg, url, lineNo, columnNo, error) {
  console.log('Error caught:', msg);
  const errorDiv = document.createElement('div');
  errorDiv.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#f3f4f6; padding:10px; border-radius:5px; z-index:9999; border:1px solid #ccc;';
  errorDiv.innerHTML = '⚠️ Something went wrong. Retrying...';
  document.body.appendChild(errorDiv);
  setTimeout(() => errorDiv.remove(), 3000);
  return false;
};
</script>
</body>
</html>
