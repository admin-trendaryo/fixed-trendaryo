<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Admin - Trendaryo</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="responsive-universal.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2em;
            background: linear-gradient(135deg, #00f0ff, #ff00aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #00f0ff;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
        }

        .btn:hover {
            background: rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .btn.primary {
            background: rgba(0, 255, 136, 0.2);
            border-color: rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        .btn.primary:hover {
            background: rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-group label {
            color: #00f0ff;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        select {
            padding: 10px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: #e0e0e0;
            border-radius: 5px;
            font-family: 'Rajdhani', sans-serif;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        select:focus {
            outline: none;
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .section {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(0, 240, 255, 0.1);
            padding: 12px;
            text-align: left;
            color: #00f0ff;
            font-weight: bold;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
        }

        tr:hover {
            background: rgba(0, 240, 255, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .status-active {
            background: rgba(34, 139, 34, 0.2);
            color: #228B22;
        }

        .status-inactive {
            background: rgba(128, 128, 128, 0.2);
            color: #808080;
        }

        .status-suspended {
            background: rgba(220, 20, 60, 0.2);
            color: #DC143C;
        }

        .action-btn {
            padding: 6px 12px;
            background: rgba(0, 240, 255, 0.2);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #00f0ff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s ease;
            margin-right: 5px;
        }

        .action-btn:hover {
            background: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .action-btn.danger {
            background: rgba(220, 20, 60, 0.2);
            border-color: rgba(220, 20, 60, 0.3);
            color: #DC143C;
        }

        .action-btn.danger:hover {
            background: rgba(220, 20, 60, 0.3);
            box-shadow: 0 0 15px rgba(220, 20, 60, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5em;
            color: #00f0ff;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: #00f0ff;
            font-size: 1.5em;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #00f0ff;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: #e0e0e0;
            border-radius: 5px;
            font-family: 'Rajdhani', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.3s ease;
        }

        .modal-actions .save {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .modal-actions .save:hover {
            background: rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .modal-actions .cancel {
            background: rgba(220, 20, 60, 0.2);
            color: #DC143C;
            border: 1px solid rgba(220, 20, 60, 0.3);
        }

        .modal-actions .cancel:hover {
            background: rgba(220, 20, 60, 0.3);
            box-shadow: 0 0 15px rgba(220, 20, 60, 0.3);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #00f0ff;
        }

        .spinner {
            border: 3px solid rgba(0, 240, 255, 0.2);
            border-top: 3px solid #00f0ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .pagination button {
            padding: 8px 12px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: #00f0ff;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pagination button:hover {
            background: rgba(0, 240, 255, 0.2);
        }

        .pagination button.active {
            background: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .header-actions {
                width: 100%;
                justify-content: center;
            }

            .filters {
                flex-direction: column;
            }

            .filter-group {
                flex-direction: column;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>👥 User Management</h1>
            <div class="header-actions">
                <button class="btn" onclick="goBack()">← Back</button>
                <button class="btn primary" onclick="exportUsers()">📥 Export</button>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <label>Search:</label>
                <input type="text" id="searchInput" placeholder="Name or email..." onkeyup="handleSearch()">
            </div>
            <div class="filter-group">
                <label>Status:</label>
                <select id="statusFilter" onchange="applyFilters()">
                    <option value="">All</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                    <option value="suspended">Suspended</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Sort:</label>
                <select id="sortFilter" onchange="applyFilters()">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="name">Name (A-Z)</option>
                </select>
            </div>
        </div>

        <!-- Users Table -->
        <div class="section">
            <div class="table-container" id="usersTable">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading users...
                </div>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Edit User</span>
                <button class="modal-close" onclick="closeModal('editModal')">✕</button>
            </div>
            <form id="editForm">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="phone">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                        <option value="suspended">Suspended</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="save" onclick="saveUser()">Save Changes</button>
                    <button type="button" class="cancel" onclick="closeModal('editModal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin-manager.js"></script>
    <script>
        let currentPage = 1;
        let currentFilters = {};
        let currentUserId = null;

        // Check admin access
        function checkAdminAccess() {
            if (!window.AdminManager.isAdmin()) {
                alert('Access denied. Admin privileges required.');
                window.location.href = 'admin-login.html';
            }
        }

        // Load users
        async function loadUsers(page = 1) {
            try {
                currentPage = page;
                const response = await window.AdminManager.getAllUsers(page, 20, currentFilters);
                displayUsers(response.data || []);
                displayPagination(response.pagination || {});
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('usersTable').innerHTML = 
                    '<div class="error-message">Failed to load users</div>';
            }
        }

        // Display users
        function displayUsers(users) {
            if (users.length === 0) {
                document.getElementById('usersTable').innerHTML = 
                    '<p style="text-align: center; color: #00f0ff; padding: 20px;">No users found</p>';
                return;
            }

            const table = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.map(user => `
                            <tr>
                                <td>#${user.id}</td>
                                <td>${user.firstName} ${user.lastName}</td>
                                <td>${user.email}</td>
                                <td>${user.phone || 'N/A'}</td>
                                <td><span class="status-badge status-${user.status}">${user.status}</span></td>
                                <td>${window.AdminManager.formatDate(user.createdAt)}</td>
                                <td>
                                    <button class="action-btn" onclick="editUser('${user.id}')">Edit</button>
                                    <button class="action-btn danger" onclick="deactivateUser('${user.id}')">Deactivate</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('usersTable').innerHTML = table;
        }

        // Display pagination
        function displayPagination(pagination) {
            const paginationDiv = document.getElementById('pagination');
            if (!pagination.totalPages || pagination.totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }

            let html = '';
            if (pagination.page > 1) {
                html += `<button onclick="loadUsers(${pagination.page - 1})">← Previous</button>`;
            }

            for (let i = 1; i <= pagination.totalPages; i++) {
                html += `<button ${i === pagination.page ? 'class="active"' : ''} onclick="loadUsers(${i})">${i}</button>`;
            }

            if (pagination.page < pagination.totalPages) {
                html += `<button onclick="loadUsers(${pagination.page + 1})">Next →</button>`;
            }

            paginationDiv.innerHTML = html;
        }

        // Handle search
        let searchTimeout;
        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                applyFilters();
            }, 500);
        }

        // Apply filters
        function applyFilters() {
            currentFilters = {
                search: document.getElementById('searchInput').value,
                status: document.getElementById('statusFilter').value,
                sort: document.getElementById('sortFilter').value
            };
            loadUsers(1);
        }

        // Edit user
        async function editUser(userId) {
            try {
                currentUserId = userId;
                const user = await window.AdminManager.getUserById(userId);
                document.getElementById('firstName').value = user.firstName;
                document.getElementById('lastName').value = user.lastName;
                document.getElementById('email').value = user.email;
                document.getElementById('phone').value = user.phone || '';
                document.getElementById('status').value = user.status;
                openModal('editModal');
            } catch (error) {
                console.error('Error loading user:', error);
                alert('Failed to load user details');
            }
        }

        // Save user
        async function saveUser() {
            try {
                const userData = {
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    status: document.getElementById('status').value
                };

                await window.AdminManager.updateUser(currentUserId, userData);
                alert('User updated successfully');
                closeModal('editModal');
                loadUsers(currentPage);
            } catch (error) {
                console.error('Error saving user:', error);
                alert('Failed to save user');
            }
        }

        // Deactivate user
        async function deactivateUser(userId) {
            if (!confirm('Are you sure you want to deactivate this user?')) return;

            try {
                await window.AdminManager.deactivateUser(userId, 'Admin deactivation');
                alert('User deactivated successfully');
                loadUsers(currentPage);
            } catch (error) {
                console.error('Error deactivating user:', error);
                alert('Failed to deactivate user');
            }
        }

        // Export users
        async function exportUsers() {
            try {
                const response = await window.AdminManager.exportUsers(currentFilters);
                window.AdminManager.exportToCSV(response.data, 'users');
            } catch (error) {
                console.error('Error exporting users:', error);
                alert('Failed to export users');
            }
        }

        // Modal functions
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // Go back
        function goBack() {
            window.location.href = 'admin-dashboard-enhanced.html';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkAdminAccess();
            loadUsers();
        });
    </script>
</body>
</html>
