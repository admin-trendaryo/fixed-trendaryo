<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trendaryo Blog - Latest fashion, tech, and lifestyle trends. Expert tips, product reviews, and style guides for modern shoppers.">
    <meta name="keywords" content="blog, fashion trends, tech news, lifestyle, product reviews, style guides">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Trendaryo">
    <link rel="canonical" href="https://trendaryo.com/blog.html">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://trendaryo.com/blog.html">
    <meta property="og:title" content="Blog - Trendaryo | Fashion, Tech & Lifestyle">
    <meta property="og:description" content="Trendaryo Blog - Latest fashion, tech, and lifestyle trends. Expert tips, product reviews, and style guides for modern shoppers.">
    <meta property="og:image" content="https://trendaryo.com/assets/trendaryo-crown-star-logo.svg">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://trendaryo.com/blog.html">
    <meta property="twitter:title" content="Blog - Trendaryo | Fashion, Tech & Lifestyle">
    <meta property="twitter:description" content="Trendaryo Blog - Latest fashion, tech, and lifestyle trends. Expert tips, product reviews, and style guides for modern shoppers.">
    <meta property="twitter:image" content="https://trendaryo.com/assets/trendaryo-crown-star-logo.svg">
    
    <title>Blog - Trendaryo | Fashion, Tech & Lifestyle</title>
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="shared.css">
    <script src="performance.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="bg.js"></script>
    <style>
        :root { --accent: #00f0ff; --accent-2: #ff00aa; --accent-3: #00ff88; --glass: rgba(255,255,255,0.05); --glass-border: rgba(255,255,255,0.1); }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: #0a0a2a; color: #fff; overflow-x: hidden; transition: background 1s ease-in-out; }
        #three-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;}

        .store-header { position: fixed; top: 0; left: 0; right: 0; z-index: 10000; 
        param($m)
        $m.Value -replace 'rgba\(0,0,0,0\.(65|72|8|85|9|92)\)', 'rgba(0,0,0,0.08)'
    : blur(18px); border-bottom: 1px solid var(--glass-border); }
        .store-header-inner { max-width: 1200px; margin: 0 auto; padding: 0.8rem 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
        .store-brand { display: flex; align-items: center; gap: 0.75rem; min-width: 180px; }
        .store-logo { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent-2)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; white-space: nowrap; }

        .page-offset { padding-top: 100px; }
        
        .blog-container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        
        .blog-header { text-align: center; margin-bottom: 3rem; padding: 2rem; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; }
        .blog-header h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent-2)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }
        .blog-header p { color: rgba(255,255,255,0.8); font-size: 1.2rem; line-height: 1.6; }
        
        .blog-categories { display: flex; justify-content: center; gap: 1rem; margin-bottom: 3rem; flex-wrap: wrap; }
        .category-btn { padding: 0.75rem 1.5rem; background: #0a0a2a; border: 2px solid var(--glass-border); border-radius: 25px; color: rgba(255,255,255,0.7); font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
        .category-btn.active, .category-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
        
        .blog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem; margin-bottom: 3rem; }
        
        .blog-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden; transition: all 0.3s ease; }
        .blog-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,240,255,0.2); border-color: var(--accent); }
        
        .blog-image { position: relative; height: 200px; overflow: hidden; }
        .blog-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .blog-card:hover .blog-image img { transform: scale(1.05); }
        .blog-category { position: absolute; top: 1rem; left: 1rem; background: var(--accent-2); color: #fff; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        
        .blog-content { padding: 1.5rem; }
        .blog-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; color: rgba(255,255,255,0.6); font-size: 0.9rem; }
        .blog-author { display: flex; align-items: center; gap: 0.5rem; }
        .author-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--accent-3); }
        .blog-date { color: rgba(255,255,255,0.5); }
        
        .blog-title { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 0.75rem; line-height: 1.3; }
        .blog-excerpt { color: rgba(255,255,255,0.8); font-size: 1rem; line-height: 1.6; margin-bottom: 1.5rem; }
        
        .read-more { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--accent); font-weight: 600; text-decoration: none; transition: all 0.3s ease; }
        .read-more:hover { color: var(--accent-2); gap: 0.75rem; }
        .read-more::after { content: '→'; transition: transform 0.3s ease; }
        .read-more:hover::after { transform: translateX(3px); }
        
        .blog-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .blog-tag { background: rgba(0,240,255,0.1); border: 1px solid var(--accent); color: var(--accent); padding: 0.25rem 0.75rem; border-radius: 15px; font-size: 0.8rem; font-weight: 500; }
        
        .newsletter-section { background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-radius: 20px; padding: 3rem; text-align: center; margin-bottom: 3rem; }
        .newsletter-section h2 { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; color: #fff; margin-bottom: 1rem; }
        .newsletter-section p { color: rgba(255,255,255,0.9); font-size: 1.1rem; margin-bottom: 2rem; }
        .newsletter-form { display: flex; gap: 1rem; max-width: 500px; margin: 0 auto; }
        .newsletter-input { flex: 1; padding: 1rem; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3); border-radius: 12px; color: #fff; font-size: 1rem; transition: all 0.3s ease; }
        .newsletter-input:focus { outline: none; border-color: #fff; background: rgba(255,255,255,0.3); }
        .newsletter-input::placeholder { color: rgba(255,255,255,0.7); }
        .newsletter-btn { padding: 1rem 2rem; background: #fff; border: none; border-radius: 12px; color: var(--accent); font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; }
        .newsletter-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255,255,255,0.3); }
        
        .featured-post { grid-column: span 2; }
        .featured-post .blog-image { height: 300px; }
        .featured-post .blog-title { font-size: 1.5rem; }
        .featured-post .blog-excerpt { font-size: 1.1rem; }
        
        @media (max-width: 768px) {
            .blog-grid { grid-template-columns: 1fr; gap: 1.5rem; }
            .featured-post { grid-column: span 1; }
            .blog-categories { gap: 0.5rem; }
            .category-btn { padding: 0.5rem 1rem; font-size: 0.8rem; }
            .newsletter-form { flex-direction: column; }
            .blog-header h1 { font-size: 2rem; }
        }
    </style>
<script src="bg.js"></script>
</head>
<body>
    <canvas id="three-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;"></canvas>
    
    <!-- Full Navigation Header -->
    <div id="header-container" data-type="full"></div>

    <main class="page-offset">
        <div class="blog-container">
            <div class="blog-header">
                <h1>Trendaryo Blog</h1>
                <p>Discover the latest trends in fashion, technology, and lifestyle. Get inspired by our curated content and stay ahead of the curve.</p>
            </div>
            
            <div class="blog-categories">
                <button class="category-btn active" onclick="filterCategory('all')">All Posts</button>
                <button class="category-btn" onclick="filterCategory('fashion')">Fashion</button>
                <button class="category-btn" onclick="filterCategory('tech')">Technology</button>
                <button class="category-btn" onclick="filterCategory('lifestyle')">Lifestyle</button>
                <button class="category-btn" onclick="filterCategory('guides')">Guides</button>
            </div>
            
            <div class="blog-grid" id="blogGrid">
                <!-- Blog posts will be loaded here -->
            </div>
            
            <div class="newsletter-section">
                <h2>Stay in the Loop</h2>
                <p>Get the latest trends, exclusive offers, and style tips delivered straight to your inbox.</p>
                <form class="newsletter-form" onsubmit="subscribeNewsletter(event)">
                    <input type="email" class="newsletter-input" placeholder="Enter your email address" required>
                    <button type="submit" class="newsletter-btn">Subscribe</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer-container"></div>
    <script src="components.js"></script>
</script>
    <!-- Self-Healing System -->
<script>
window.onerror = function(msg, url, lineNo, columnNo, error) {
  console.log('Error caught:', msg);
  const errorDiv = document.createElement('div');
  errorDiv.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#f3f4f6; padding:10px; border-radius:5px; z-index:9999; border:1px solid #ccc;';
  errorDiv.innerHTML = '⚠️ Something went wrong. Retrying...';
  document.body.appendChild(errorDiv);
  setTimeout(() => errorDiv.remove(), 3000);
  return false;
};
</script>
</body>
</html>
