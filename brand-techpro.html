<script src="bg.js"></script>

    <script src="script.js"></script>
    <script>
        // Three.js particles
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 100;

        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 1000; i++) {
            vertices.push((Math.random() - 0.5) * 800, (Math.random() - 0.5) * 800, (Math.random() - 0.5) * 500);
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0x00f0ff, size: 2 });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) * 0.5;
            mouseY = (e.clientY - window.innerHeight / 2) * 0.5;
        });

        function animate() {
            requestAnimationFrame(animate);
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);
            particles.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        animate();

        // Load products
        const techProProducts = [
            { id: 5, name: "Wireless Headphones", price: 249, image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500", rating: 5, reviews: 342 },
            { id: 6, name: "Smart Fitness Band", price: 99, image: "https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=500", rating: 5, reviews: 89 },
            { id: 9, name: "Bluetooth Speaker", price: 79.99, image: "https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=500", rating: 4, reviews: 89 },
            { id: 11, name: "Wireless Charging Pad", price: 29.99, image: "https://images.unsplash.com/photo-1591290619762-c588e3f1c714?w=500", rating: 5, reviews: 234 },
            { id: 13, name: "Gaming Keyboard", price: 149.99, image: "https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?w=500", rating: 5, reviews: 312 },
            { id: 27, name: "Wireless Earbuds Pro", price: 159.99, image: "https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=500", rating: 5, reviews: 312 }
        ];

        const grid = document.getElementById('products-grid');
        techProProducts.forEach(product => {
            grid.innerHTML += `
                <a href="product.html?id=${product.id}" style="background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; overflow: hidden; text-decoration: none; color: inherit; transition: all 0.3s;" onmouseover="this.style.transform='translateY(-10px)'; this.style.borderColor='var(--accent)';" onmouseout="this.style.transform=''; this.style.borderColor='';">
                    <div style="height: 250px; background: url('${product.image}') center/cover;"></div>
                    <div style="padding: 1.5rem;">
                        <h3 style="font-family: 'Orbitron', sans-serif; margin-bottom: 0.5rem;">${product.name}</h3>
                        <div style="color: #ffd700; margin-bottom: 0.5rem;">${'★'.repeat(product.rating)}${'☆'.repeat(5-product.rating)} (${product.reviews})</div>
                        <div style="font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--accent); font-weight: 900;">$${product.price}</div>
                        <button style="width: 100%; margin-top: 1rem; padding: 0.75rem; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border: none; border-radius: 8px; color: #000; font-weight: 700; cursor: pointer;">Add to Cart</button>
                    </div>
                </a>
            `;
        });
    </script>

    <!-- Self-Healing System -->
<script>
window.onerror = function(msg, url, lineNo, columnNo, error) {
  console.log('Error caught:', msg);
  const errorDiv = document.createElement('div');
  errorDiv.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#f3f4f6; padding:10px; border-radius:5px; z-index:9999; border:1px solid #ccc;';
  errorDiv.innerHTML = '⚠️ Something went wrong. Retrying...';
  document.body.appendChild(errorDiv);
  setTimeout(() => errorDiv.remove(), 3000);
  return false;
};
</script>
