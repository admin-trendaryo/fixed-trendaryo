    <title>Thank You - Trendaryo | 3D Experience</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f0ff; --accent-2: #ff00aa; --accent-3: #00ff88; --glass: rgba(255,255,255,0.05); --glass-border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: #000; color: #fff; overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        #three-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;}
        
        .thank-you-container-3d { text-align: center; padding: 2rem; max-width: 600px; }
        .success-icon-3d { width: 120px; height: 120px; margin: 0 auto 2rem; background: linear-gradient(135deg, var(--accent), var(--accent-3)); border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: successPulse 2s infinite; }
        @keyframes successPulse { 0%, 100% { box-shadow: 0 0 30px rgba(0,240,255,0.5); } 50% { box-shadow: 0 0 60px rgba(0,240,255,0.8); } }
        .success-icon-3d svg { width: 60px; height: 60px; color: #000; }
        
        .thank-you-title-3d { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 900; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }
        .thank-you-subtitle-3d { color: #aaa; font-size: 1.2rem; margin-bottom: 2rem; line-height: 1.8; }
        .order-number-3d { display: inline-block; background: var(--glass); border: 1px solid var(--glass-border); padding: 1rem 2rem; border-radius: 12px; margin-bottom: 2rem; }
        .order-number-3d span { color: var(--accent); font-family: 'Orbitron', sans-serif; font-weight: 700; }
        
        .action-buttons-3d { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn-primary-3d { padding: 1rem 2rem; background: linear-gradient(135deg, var(--accent), var(--accent-3)); border: none; border-radius: 12px; font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700; color: #000; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s; text-decoration: none; }
        .btn-primary-3d:hover { box-shadow: 0 0 40px rgba(0,240,255,0.5); transform: translateY(-2px); }
        .btn-secondary-3d { padding: 1rem 2rem; background: #0a0a2a; border: 2px solid var(--glass-border); border-radius: 12px; font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 600; color: #fff; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s; text-decoration: none; }
        .btn-secondary-3d:hover { border-color: var(--accent); color: var(--accent); }
        
        .preloader-3d { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 2rem; }
        .preloader-3d.hidden { opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        .preloader-logo-3d { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .preloader-spinner-3d { width: 50px; height: 50px; border: 3px solid var(--glass-border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
<script src="bg.js"></script>
</head>

    <!-- Self-Healing System -->
<script>
window.onerror = function(msg, url, lineNo, columnNo, error) {
  console.log('Error caught:', msg);
  const errorDiv = document.createElement('div');
  errorDiv.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#f3f4f6; padding:10px; border-radius:5px; z-index:9999; border:1px solid #ccc;';
  errorDiv.innerHTML = '⚠️ Something went wrong. Retrying...';
  document.body.appendChild(errorDiv);
  setTimeout(() => errorDiv.remove(), 3000);
  return false;
};
</script>
    <script>
        // Preloader: failsafe ensures it always hides
        function hidePreloader() { var p = document.getElementById('preloader'); if (p) p.classList.add('hidden'); }
        if (document.readyState === 'complete') { setTimeout(hidePreloader, 800); }
        else { window.addEventListener('load', function () { setTimeout(hidePreloader, 800); }); }
        setTimeout(hidePreloader, 2000);
    </script>
