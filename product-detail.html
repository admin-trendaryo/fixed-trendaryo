<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product - Trendaryo</title>
    <link rel="stylesheet" href="responsive.css">
    <script src="performance.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        :root{--accent:#00f0ff;--accent-2:#ff00aa;--accent-3:#00ff88;--glass:rgba(255,255,255,0.05);--glass-border:rgba(255,255,255,0.1);}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Rajdhani',sans-serif;background:linear-gradient(180deg,#0a0a2a,#1a1a40);color:#fff;padding-top:80px;}
        .container{max-width:1200px;margin:0 auto;padding:2rem;}
        .product-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;margin-bottom:3rem;}
        .product-images{position:sticky;top:100px;}
        .main-image{width:100%;aspect-ratio:1;object-fit:cover;border-radius:20px;border:1px solid var(--glass-border);background:var(--glass);}
        .product-info h1{font-family:'Orbitron',sans-serif;font-size:2.5rem;margin-bottom:1rem;}
        .price{font-size:2rem;color:var(--accent);margin:1rem 0;}
        .old-price{text-decoration:line-through;color:#888;margin-left:1rem;font-size:1.5rem;}
        .rating{display:flex;align-items:center;gap:0.5rem;margin:1rem 0;color:#ffa500;}
        .description{color:#ccc;line-height:1.8;margin:1.5rem 0;}
        .quantity{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;}
        .qty-btn{width:40px;height:40px;border:1px solid var(--glass-border);background:var(--glass);color:#fff;border-radius:8px;cursor:pointer;font-size:1.2rem;}
        .qty-input{width:60px;text-align:center;padding:0.5rem;border:1px solid var(--glass-border);background:var(--glass);color:#fff;border-radius:8px;}
        .btn{padding:1rem 2rem;border:none;border-radius:10px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:inherit;font-size:1rem;}
        .btn-primary{background:var(--accent);color:#000;}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,240,255,0.3);}
        .btn-secondary{background:var(--glass);color:#fff;border:1px solid var(--glass-border);}
        .actions{display:flex;gap:1rem;margin:2rem 0;}
        .features{background:var(--glass);border:1px solid var(--glass-border);border-radius:15px;padding:2rem;margin:2rem 0;}
        .features h3{color:var(--accent);margin-bottom:1rem;}
        .features ul{list-style:none;}
        .features li{padding:0.5rem 0;color:#ccc;}
        .features li:before{content:'✓';color:var(--accent-3);margin-right:0.5rem;font-weight:700;}
        .reviews{background:var(--glass);border:1px solid var(--glass-border);border-radius:15px;padding:2rem;margin:2rem 0;}
        .reviews h3{color:var(--accent);margin-bottom:1.5rem;}
        .review{border-bottom:1px solid var(--glass-border);padding:1rem 0;}
        .review:last-child{border:none;}
        .review-header{display:flex;justify-content:space-between;margin-bottom:0.5rem;}
        .review-author{font-weight:600;}
        .review-rating{color:#ffa500;}
        .review-text{color:#ccc;line-height:1.6;}
        .related{margin:3rem 0;}
        .related h2{font-family:'Orbitron',sans-serif;margin-bottom:2rem;text-align:center;}
        .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:2rem;}
        .product-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:15px;padding:1rem;cursor:pointer;transition:all 0.2s;}
        .product-card:hover{transform:translateY(-5px);border-color:var(--accent);}
        .product-card img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;margin-bottom:1rem;}
        .product-card h4{margin-bottom:0.5rem;}
        .product-card .price{font-size:1.3rem;margin:0.5rem 0;}
        @media(max-width:768px){.product-grid{grid-template-columns:1fr;}.product-images{position:static;}}
    </style>
<script src="bg.js"></script>
</head>
<body>
    <canvas id="three-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;"></canvas>
    <div id="header-container"></div>
    
    <div class="container">
        <div class="product-grid">
            <div class="product-images">
                <img id="main-image" class="main-image" src="" alt="">
            </div>
            
            <div class="product-info">
                <h1 id="product-name"></h1>
                <div class="rating">
                    <span id="rating-stars"></span>
                    <span id="review-count"></span>
                </div>
                <div class="price">
                    <span id="product-price"></span>
                    <span id="old-price" class="old-price"></span>
                </div>
                <p id="product-description" class="description"></p>
                
                <div class="quantity">
                    <span>Quantity:</span>
                    <button class="qty-btn" onclick="changeQty(-1)">-</button>
                    <input type="number" id="qty" class="qty-input" value="1" min="1">
                    <button class="qty-btn" onclick="changeQty(1)">+</button>
                    <span id="stock-info" style="color:#888;margin-left:1rem;"></span>
                </div>
                
                <div class="actions">
                    <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
                    <button class="btn btn-secondary" onclick="addToWishlist()">♥ Wishlist</button>
                </div>
                
                <div class="features">
                    <h3>Features</h3>
                    <ul id="features-list"></ul>
                </div>
            </div>
        </div>
        
        <div class="reviews">
            <h3>Customer Reviews</h3>
            <div id="reviews-list"></div>
        </div>
        
        <div class="related">
            <h2>Related Products</h2>
            <div class="related-grid" id="related-products"></div>
        </div>
    </div>
    
    <div id="footer-container"></div>
    <script src="components.js"></script>
    <script src="script.js"></script>
    <script>
        const productId = new URLSearchParams(window.location.search).get('id');
        let product = null;
        
        async function loadProduct() {
            try {
                const res = await fetch(`http://localhost:3000/api/products/${productId}`);
                product = await res.json();
                
                document.getElementById('product-name').textContent = product.name;
                document.getElementById('main-image').src = product.image;
                document.getElementById('main-image').alt = product.name;
                document.getElementById('product-price').textContent = `$${product.price.toFixed(2)}`;
                if (product.oldPrice) {
                    document.getElementById('old-price').textContent = `$${product.oldPrice.toFixed(2)}`;
                }
                document.getElementById('product-description').textContent = product.description || 'No description available.';
                document.getElementById('rating-stars').textContent = '★'.repeat(Math.floor(product.rating || 0)) + '☆'.repeat(5 - Math.floor(product.rating || 0));
                document.getElementById('review-count').textContent = `(${product.reviews || 0} reviews)`;
                document.getElementById('stock-info').textContent = product.stock > 0 ? `${product.stock} in stock` : 'Out of stock';
                
                if (product.features && product.features.length) {
                    document.getElementById('features-list').innerHTML = product.features.map(f => `<li>${f}</li>`).join('');
                }
                
                loadReviews();
                loadRelated();
            } catch (err) {
                alert('Product not found');
                window.location.href = 'shop.html';
            }
        }
        
        async function loadReviews() {
            try {
                const res = await fetch(`http://localhost:3000/api/products/${productId}/reviews`);
                const reviews = await res.json();
                const list = document.getElementById('reviews-list');
                
                if (reviews.length === 0) {
                    list.innerHTML = '<p style="color:#888;">No reviews yet. Be the first to review!</p>';
                } else {
                    list.innerHTML = reviews.map(r => `
                        <div class="review">
                            <div class="review-header">
                                <span class="review-author">${r.guestName || 'Customer'}</span>
                                <span class="review-rating">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                            </div>
                            <p class="review-text">${r.comment}</p>
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error('Failed to load reviews');
            }
        }
        
        async function loadRelated() {
            try {
                const res = await fetch(`http://localhost:3000/api/products?category=${product.category}&limit=4`);
                const data = await res.json();
                const related = (data.products || data).filter(p => p.id !== product.id).slice(0, 4);
                
                document.getElementById('related-products').innerHTML = related.map(p => `
                    <div class="product-card" onclick="window.location.href='product-detail.html?id=${p.id}'">
                        <img src="${p.image}" alt="${p.name}">
                        <h4>${p.name}</h4>
                        <div class="price">$${p.price.toFixed(2)}</div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Failed to load related products');
            }
        }
        
        function changeQty(delta) {
            const input = document.getElementById('qty');
            const newVal = Math.max(1, Math.min(product.stock, parseInt(input.value) + delta));
            input.value = newVal;
        }
        
        function addToCart() {
            if (!product) return;
            const qty = parseInt(document.getElementById('qty').value);
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const existing = cart.find(item => item.id === product.id);
            
            if (existing) {
                existing.quantity += qty;
            } else {
                cart.push({id: product.id, name: product.name, price: product.price, image: product.image, quantity: qty});
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            alert('Added to cart!');
            updateCartCount();
        }
        
        function addToWishlist() {
            if (!product) return;
            const wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
            if (!wishlist.includes(product.id)) {
                wishlist.push(product.id);
                localStorage.setItem('wishlist', JSON.stringify(wishlist));
                alert('Added to wishlist!');
            } else {
                alert('Already in wishlist');
            }
        }
        
        loadProduct();
    </script>

    <!-- Self-Healing System -->
<script>
window.onerror = function(msg, url, lineNo, columnNo, error) {
  console.log('Error caught:', msg);
  const errorDiv = document.createElement('div');
  errorDiv.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#f3f4f6; padding:10px; border-radius:5px; z-index:9999; border:1px solid #ccc;';
  errorDiv.innerHTML = '⚠️ Something went wrong. Retrying...';
  document.body.appendChild(errorDiv);
  setTimeout(() => errorDiv.remove(), 3000);
  return false;
};
</script>
</body>
</html>
